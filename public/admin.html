<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="z7Note 管理后台">
    <title>z7Note Admin - 管理后台</title>
    <style>
        :root { --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; --accent: #2563eb; --green: #10b981; --red: #ef4444; --orange: #f97316; --gray: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
        .container { display: flex; gap: 10px; min-height: calc(100vh - 40px); padding: 50px 10px 10px; }
        #sidebar { flex: 0 0 280px; overflow-y: auto; }
        #main { flex: 1; overflow: hidden; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 100; }
        .tool-btn { background: white; border: 1px solid var(--border); padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .tool-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .card { background: white; border-radius: 6px; padding: 10px; border: 1px solid var(--border); }
        .badge { background: rgba(37, 99, 235, 0.1); color: var(--accent); padding: 1px 5px; border-radius: 3px; font-size: 9px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background: #f1f5f9; font-weight: 600; white-space: nowrap; }
        th[onclick] { cursor: pointer; user-select: none; }
        .form-item { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
        .form-item label { font-size: 10px; color: var(--gray); }
        .form-item input, .form-item select, .form-item textarea { padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; width: 100%; }
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus { outline: none; border-color: var(--accent); }
        .form-row { display: flex; gap: 6px; }
        .form-checkbox { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-bottom: 8px; }
        .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .tab-btn { padding: 6px 12px; border: none; background: transparent; font-size: 11px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal > form { background: white; padding: 15px; border-radius: 8px; min-width: 280px; max-width: 90vw; }
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 50px 6px 6px; }
            #sidebar { flex: none; max-height: auto; }
            #main { overflow: visible; }
            .card { padding: 8px; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            th, td { white-space: nowrap; }
            .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .tab-btn { flex-shrink: 0; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:6px">
        <strong>z7Note Admin</strong>
        <span class="badge">管理后台</span>
    </div>
    <div style="display:flex;gap:4px">
        <button class="tool-btn" onclick="loadUsers()">刷新</button>
        <button class="tool-btn" onclick="location.href='/'">返回</button>
    </div>
</div>

<div class="container">
    <aside class="card" id="sidebar">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">系统配置</div>
        <div class="form-row">
            <button class="tool-btn" onclick="showSystemConfig()" style="flex:1">文件配置</button>
            <button class="tool-btn" onclick="cleanupExpiredUploads()" style="flex:1">清理上传</button>
        </div>
        <div style="font-size:13px;font-weight:600;margin:15px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)">数据库管理</div>
        <div class="card" style="margin-bottom:10px">
            <div style="font-size:11px;color:var(--gray);margin-bottom:8px">
                <div>总大小: <strong id="db-total-size">加载中...</strong></div>
                <div>已使用: <strong id="db-used-size">加载中...</strong></div>
                <div>空闲空间: <strong id="db-free-size">加载中...</strong></div>
            </div>
            <div class="form-row">
                <button class="tool-btn" onclick="loadDatabaseInfo()" style="flex:1">刷新</button>
                <button class="tool-btn" onclick="vacuumDatabase()" style="flex:1;background:var(--orange);color:white;border:none">清理优化</button>
            </div>
        </div>
        <div style="font-size:13px;font-weight:600;margin:15px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)">备份配置</div>
        <form onsubmit="event.preventDefault();saveBackupConfig();">
            <div class="form-item"><label>备份模式</label><select id="bc-backupMode"><option value="incremental">增量</option><option value="full">全量</option></select></div>
            <div class="form-item"><label>定时任务</label><select id="bc-schedule" onchange="toggleCustomSchedule(this)"><option value="none">关闭</option><option value="0 0 * * *">每天凌晨</option><option value="0 0 * * 0">每周日凌晨</option><option value="0 */6 * * *">每6小时</option><option value="0 */12 * * *">每12小时</option><option value="custom">自定义</option></select></div>
            <div class="form-item" id="bc-schedule-custom-container" style="display:none"><label>Cron</label><input type="text" id="bc-schedule-custom" placeholder="0 2 * * *"></div>
            <div class="form-item"><label>保留数</label><input type="number" id="bc-keepCount" min="0" placeholder="0=不限制"></div>
            <div class="form-item"><label>WebDAV地址</label><input type="url" id="bc-webdavUrl" placeholder="https://..."></div>
            <div class="form-item"><label>用户名</label><input type="text" id="bc-webdavUser" placeholder="用户名" autocomplete="username"></div>
            <div class="form-item"><label>密码</label><input type="password" id="bc-webdavPassword" placeholder="密码" autocomplete="current-password"></div>
            <div class="form-checkbox"><input type="checkbox" id="bc-useWebDAV"><span>启用WebDAV</span></div>
            <div class="form-item"><label>通知邮箱</label><input type="email" id="bc-emailAddress" placeholder="email@ex.com"></div>
            <div class="form-checkbox"><input type="checkbox" id="bc-attachments"><span>打包附件</span></div>
            <div class="form-row" style="margin-top:10px">
                <button type="submit" class="tool-btn" style="flex:1;background:var(--green);color:white;border:none">保存</button>
                <button type="button" onclick="backupNow()" class="tool-btn" style="flex:1">立即备份</button>
            </div>
            <div class="form-row">
                <button type="button" onclick="window.open('/api/admin/backup/download-full')" class="tool-btn" style="flex:1">下载全量</button>
                <button type="button" onclick="window.open('/api/admin/backup/download-inc')" class="tool-btn" style="flex:1">下载增量</button>
            </div>
        </form>
    </aside>
    <main id="main">
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users')">用户管理</button>
                <button class="tab-btn" onclick="switchTab('shares')">分享管理</button>
                <button class="tab-btn" onclick="switchTab('notes')">内容审计</button>
            </div>
            <div id="tab-users" class="tab-content active">
                <div class="form-row" style="margin-bottom:8px">
                    <input type="text" id="userSearch" placeholder="搜索用户..." oninput="debounceUserSearch()" style="flex:1;padding:5px 8px;font-size:11px">
                    <button class="tool-btn" onclick="showAddUser()" style="background:var(--green);color:white;border:none">+新增</button>
                </div>
                <div style="overflow:auto;max-height:calc(100vh - 200px)">
                    <table>
                        <thead>
                            <tr>
                                <th onclick="sortUsers('username')">用户 <span id="sort-username">⇅</span></th>
                                <th>数据数量 (<span onclick="sortUsers('noteCount')" title="排序:笔记" style="cursor:pointer">N</span>/<span onclick="sortUsers('contactCount')" title="排序:联系人" style="cursor:pointer">C</span>/<span onclick="sortUsers('eventCount')" title="排序:日程" style="cursor:pointer">E</span>/<span onclick="sortUsers('todoCount')" title="排序:待办" style="cursor:pointer">T</span>)</th>
                                <th onclick="sortUsers('dbSize')">数据库空间 <span id="sort-dbSize">⇅</span></th>
                                <th onclick="sortUsers('attachmentSize')">附件占用 <span id="sort-attachmentSize">⇅</span></th>
                                <th>存储限额 (MB)</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userList"></tbody>
                    </table>
                </div>
            </div>
            <div id="tab-shares" class="tab-content">
                <div class="form-row" style="margin-bottom:8px">
                    <button class="tool-btn" onclick="batchDeleteShares()" style="color:var(--red);border-color:var(--red)">批量删除</button>
                </div>
                <div style="overflow:auto;max-height:calc(100vh - 200px)">
                    <table>
                        <thead><tr><th><input type="checkbox" onclick="toggleSelectAllShares(this)"></th><th>用户</th><th>标题</th><th>类型</th><th>时间</th><th>有效期</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="shareList"></tbody>
                    </table>
                </div>
            </div>
            <div id="tab-notes" class="tab-content">
                <div class="form-row" style="margin-bottom:8px">
                    <input type="text" id="noteSearch" placeholder="搜索内容..." oninput="debounceNoteSearch()" style="flex:1;padding:5px 8px;font-size:11px">
                    <button class="tool-btn" onclick="batchDeleteNotes()" style="color:var(--red);border-color:var(--red)">批量删除</button>
                    <button class="tool-btn" onclick="emptyAllTrash()" style="color:var(--red);border-color:var(--red)">清空回收站</button>
                </div>
                <div style="overflow:auto;max-height:calc(100vh - 240px)">
                    <table>
                        <thead><tr><th><input type="checkbox" onclick="toggleSelectAll(this)"></th><th>用户</th><th>标题</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="noteList"></tbody>
                    </table>
                </div>
                <div class="form-row" style="justify-content:flex-end;margin-top:8px;align-items:center;font-size:11px">
                    <span id="pageInfo" style="color:var(--gray)">第 1 / 1 页</span>
                    <button id="prevBtn" onclick="changePage(-1)" class="tool-btn">上一页</button>
                    <button id="nextBtn" onclick="changePage(1)" class="tool-btn">下一页</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modal" class="modal">
    <form id="modal-form">
        <h3 id="modalTitle" style="font-size:14px;margin-bottom:12px"></h3>
        <div id="modalInputs" style="margin-bottom:12px"></div>
        <div class="form-row">
            <button type="button" onclick="closeModal()" class="tool-btn" style="flex:1">取消</button>
            <button type="submit" id="modalConfirm" class="tool-btn" style="flex:1;background:var(--green);color:white;border:none">确认</button>
        </div>
    </form>
</div>

<script>
    let currentPage = 1, totalPages = 1;
    let userSortField = 'noteCount', userSortOrder = 'desc';
    let userSearchTimer, noteSearchTimer;

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
    }

    // 系统配置
    async function showSystemConfig() {
        try {
            const res = await fetch('/api/admin/system/config');
            const data = await res.json();
            if (!res.ok || data.status !== 'ok') return alert('加载配置失败: ' + (data.error || '未知错误'));
            const c = data.config;
            const fields = [
                { id: 'maxFileSize', label: '最大文件(MB)', type: 'number', val: c.maxFileSize?.value || 500 },
                { id: 'allowedFileTypes', label: '允许的文件类型', type: 'textarea', val: c.allowedFileTypes?.value || '' },
                { id: 'chunkUploadEnabled', label: '分片上传', type: 'select', opts: ['启用', '禁用'], val: c.chunkUploadEnabled?.value || 'true' },
                { id: 'chunkSize', label: '分片大小(MB)', type: 'number', val: c.chunkSize?.value || 5 },
                { id: 'imageCompressionEnabled', label: '图片压缩', type: 'select', opts: ['启用', '禁用'], val: c.imageCompressionEnabled?.value || 'true' },
                { id: 'imageCompressionQuality', label: '压缩质量(0-100)', type: 'number', val: c.imageCompressionQuality?.value || 85 },
                { id: 'imageCompressionMaxWidth', label: '最大宽度(px)', type: 'number', val: c.imageCompressionMaxWidth?.value || 1920 },
                { id: 'imageCompressionMaxHeight', label: '最大高度(px)', type: 'number', val: c.imageCompressionMaxHeight?.value || 1080 },
                { id: 'dynamicRateLimitEnabled', label: '动态限流', type: 'select', opts: ['启用', '禁用'], val: c.dynamicRateLimitEnabled?.value || 'true' },
                { id: 'dailyBackupLimit', label: '每日备份限制', type: 'select', opts: ['不限制', '每天1次'], val: c.dailyBackupLimit?.value || '1' }
            ];
            const html = fields.map(f => {
                if (f.type === 'textarea') return `<label>${f.label}</label><textarea id="sc-${f.id}" style="height:40px">${f.val}</textarea>`;
                if (f.type === 'select') return `<label>${f.label}</label><select id="sc-${f.id}">${f.opts.map((o,i) => `<option value="${i===0?'true':'false'}" ${f.val===String(i===0?'true':'false')?'selected':''}>${o}</option>`).join('')}</select>`;
                return `<label>${f.label}</label><input type="${f.type}" id="sc-${f.id}" value="${f.val}">`;
            }).join('');
            openModal('文件上传配置', html, async (e) => {
                e.preventDefault();
                const configs = Object.fromEntries(fields.map(f => [f.id, document.getElementById('sc-'+f.id).value]));
                const saveRes = await fetch('/api/admin/system/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ configs }) });
                const saveData = await saveRes.json();
                if (saveRes.ok && saveData.status === 'ok') { alert('配置已保存'); closeModal(); } else { alert('保存失败: ' + (saveData?.error || '未知错误')); }
            });
        } catch(e) { console.error(e); alert('加载配置失败: ' + e.message); }
    }

    async function cleanupExpiredUploads() {
        if (!confirm('确定要清理所有过期的上传会话吗？')) return;
        const res = await fetch('/api/admin/system/cleanup-uploads', { method: 'POST' });
        const data = await res.json();
        res.ok && data.status === 'ok' ? alert(`已清理 ${data.count} 个过期上传会话`) : alert('清理失败: ' + (data.error || '未知错误'));
    }

    // 数据库管理
    async function loadDatabaseInfo() {
        try {
            const res = await fetch('/api/admin/database/info');
            if (!res.ok) {
                alert('无法获取数据库信息');
                return;
            }

            const data = await res.json();
            document.getElementById('db-total-size').textContent = data.totalSizeMB + ' MB';
            document.getElementById('db-used-size').textContent = data.usedSizeMB + ' MB';
            document.getElementById('db-free-size').textContent = data.freeSpaceMB + ' MB';

            // 如果空闲空间超过50MB，提示清理
            if (parseFloat(data.freeSpaceMB) > 50) {
                alert(`数据库有 ${data.freeSpaceMB} MB 碎片空间，建议执行清理优化。`);
            }
        } catch(e) {
            console.error(e);
            alert('获取数据库信息失败');
        }
    }

    async function vacuumDatabase() {
        if (!confirm('确定要执行数据库清理吗？\n\n这将重建数据库文件，需要一定时间。')) return;

        const btn = event.target;
        try {
            btn.disabled = true;
            btn.textContent = '清理中...';

            const res = await fetch('/api/admin/database/vacuum', { method: 'POST' });
            const data = await res.json();

            if (!res.ok) {
                alert('数据库清理失败: ' + (data.error || '未知错误'));
            } else {
                alert('数据库清理完成！');
                loadDatabaseInfo();
            }
        } catch(e) {
            console.error(e);
            alert('数据库清理失败');
        } finally {
            btn.disabled = false;
            btn.textContent = '清理优化';
        }
    }

    // 备份配置
    async function loadBackupConfig() {
        try {
            const c = await fetch('/api/admin/backup/config').then(r => r.json());
            if (c.id) {
                const preset = ['none', '0 0 * * *', '0 0 * * 0', '0 */6 * * *', '0 */12 * * *'];
                const schedule = c.schedule || 'none';
                const sel = document.getElementById('bc-schedule');
                const customContainer = document.getElementById('bc-schedule-custom-container');
                preset.includes(schedule) ? (sel.value = schedule, customContainer.style.display = 'none') : (sel.value = 'custom', document.getElementById('bc-schedule-custom').value = schedule, customContainer.style.display = 'flex');
                document.getElementById('bc-backupMode').value = c.backupMode || 'incremental';
                document.getElementById('bc-attachments').checked = !!c.includeAttachments;
                document.getElementById('bc-useWebDAV').checked = !!c.useWebDAV;
                document.getElementById('bc-keepCount').value = c.keepCount || 0;
                document.getElementById('bc-emailAddress').value = c.emailAddress || '';
                document.getElementById('bc-webdavUrl').value = c.webdavUrl || '';
                document.getElementById('bc-webdavUser').value = c.webdavUser || '';
                document.getElementById('bc-webdavPassword').value = c.webdavPassword || '';
            }
        } catch(e) {}
    }

    function toggleCustomSchedule(sel) {
        document.getElementById('bc-schedule-custom-container').style.display = sel.value === 'custom' ? 'flex' : 'none';
    }

    async function saveBackupConfig() {
        let schedule = document.getElementById('bc-schedule').value;
        if (schedule === 'custom' && !(schedule = document.getElementById('bc-schedule-custom').value.trim())) return alert('请输入 cron 表达式');
        const res = await fetch('/api/admin/backup/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
            schedule, backupMode: document.getElementById('bc-backupMode').value,
            includeAttachments: document.getElementById('bc-attachments').checked,
            useWebDAV: document.getElementById('bc-useWebDAV').checked,
            keepCount: parseInt(document.getElementById('bc-keepCount').value) || 0,
            emailAddress: document.getElementById('bc-emailAddress').value,
            webdavUrl: document.getElementById('bc-webdavUrl').value,
            webdavUser: document.getElementById('bc-webdavUser').value,
            webdavPassword: document.getElementById('bc-webdavPassword').value
        }) });
        res.ok ? alert('备份配置已保存') : alert('保存失败');
    }

    async function backupNow() {
        if (!confirm('确定要立即执行备份吗？')) return;
        const res = await fetch('/api/admin/backup/now', { method: 'POST' });
        const data = await res.json();
        res.ok ? alert('备份执行成功！') : alert('备份失败: ' + (data.error || '未知错误'));
    }

    // 工具函数：格式化大小
    function formatSize(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let size = bytes;
        let unitIndex = 0;
        while (size >= 1024 && unitIndex < units.length - 1) {
            size /= 1024;
            unitIndex++;
        }
        return `${size.toFixed(unitIndex === 0 ? 0 : 2)} ${units[unitIndex]}`;
    }

    // 用户管理
    async function loadUsers() {
        const url = `/api/admin/users/stats?search=${encodeURIComponent(document.getElementById('userSearch').value)}&sort=${userSortField}&order=${userSortOrder}`;
        ['username', 'dbSize', 'attachmentSize', 'contactCount', 'eventCount', 'todoCount', 'noteCount'].forEach(f => {
            const el = document.getElementById(`sort-${f}`);
            if (el) {
                el.innerText = f === userSortField ? (userSortOrder === 'desc' ? '↓' : '↑') : '⇅';
                el.style.color = f === userSortField ? 'var(--accent)' : 'var(--gray)';
            }
        });
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const users = await res.json();
            document.getElementById('userList').innerHTML = users.map(u => `
                <tr>
                    <td>
                        <strong>${u.username}</strong>
                        <div style="color:var(--gray);font-size:9px">${u.email||'无邮箱'}</div>
                    </td>
                    <td>
                        <div style="display:flex;gap:4px">
                            <span class="badge" title="笔记: ${u.noteCount} 篇" style="${u.noteCount > 0 ? 'font-weight:bold;border:1px solid var(--accent)' : ''}">${u.noteCount || 0} N</span>
                            <span class="badge" title="联系人: ${u.contactCount} 个" style="${u.contactCount > 0 ? 'font-weight:bold;border:1px solid var(--accent)' : ''}">${u.contactCount || 0} C</span>
                            <span class="badge" title="日程: ${u.eventCount} 条" style="background:rgba(16, 185, 129, 0.1);color:var(--green);${u.eventCount > 0 ? 'font-weight:bold;border:1px solid var(--green)' : ''}">${u.eventCount || 0} E</span>
                            <span class="badge" title="待办: ${u.todoCount} 条" style="background:rgba(249, 115, 22, 0.1);color:var(--orange);${u.todoCount > 0 ? 'font-weight:bold;border:1px solid var(--orange)' : ''}">${u.todoCount || 0} T</span>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight:600">${formatSize(u.dbSize)}</div>
                        <div style="color:var(--gray);font-size:9px">数据库占用</div>
                    </td>
                    <td>
                        <div style="font-weight:600;color:var(--green)">${formatSize(u.attachmentSize)}</div>
                        <div style="color:var(--gray);font-size:9px">文件占用</div>
                    </td>
                    <td>
                        <div style="display:flex;gap:2px;align-items:center;white-space:nowrap">
                            <input type="number" value="${u.noteLimit}" title="笔记限额" style="width:38px;padding:1px 2px;font-size:10px" onchange="updateQuotaInline('${u.username}',this.value,${u.fileLimit})">
                            <span style="color:var(--gray)">|</span>
                            <input type="number" value="${u.fileLimit}" title="文件限额" style="width:38px;padding:1px 2px;font-size:10px" onchange="updateQuotaInline('${u.username}',${u.noteLimit},this.value)">
                        </div>
                    </td>
                    <td style="text-align:right">
                        <div style="display:flex;gap:2px;justify-content:flex-end">
                            <button class="tool-btn" onclick="resetPass('${u.username}')" title="重置密码" style="padding:2px 4px;font-size:9px">改密</button>
                            <button class="tool-btn" onclick="deleteUser('${u.username}')" title="彻底注销" style="color:var(--red);border-color:var(--red);padding:2px 4px;font-size:9px">注销</button>
                        </div>
                    </td>
                </tr>`).join('');
        } catch(e) { 
            console.error(e);
            document.getElementById('userList').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red);padding:10px">加载失败</td></tr>'; 
        }
    }

    function sortUsers(field) {
        if (userSortField === field) userSortOrder = userSortOrder === 'desc' ? 'asc' : 'desc';
        else { userSortField = field; userSortOrder = 'asc'; }
        loadUsers();
    }

    function debounceUserSearch() { clearTimeout(userSearchTimer); userSearchTimer = setTimeout(loadUsers, 500); }

    async function updateQuotaInline(username, nLimit, fLimit) {
        await fetch('/api/admin/users/update-quota', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username, noteLimit: parseInt(nLimit), fileLimit: parseInt(fLimit) }) });
    }

    async function deleteUser(username) {
        if(confirm(`警告：确定彻底删除用户 ${username} 吗？`)) { await fetch(`/api/admin/users/${username}`, { method: 'DELETE' }); loadUsers(); }
    }

    // 分享管理
    async function loadShares() {
        try {
            const res = await fetch('/api/share/list');
            if (!res.ok) throw new Error();
            const shares = await res.json();
            const now = Date.now();
            document.getElementById('shareList').innerHTML = shares.length ? shares.map(s => {
                const isExpired = s.expiresAt && now > s.expiresAt;
                const title = s.targetType === 'note' ? (s.noteTitle || s.target || '无标题') : s.target.split('/').pop() || s.target;
                const shareUrl = `${location.protocol}//${location.host}/s/${s.token}`;
                return `
                    <tr>
                        <td><input type="checkbox" class="share-checkbox" value="${s.token}"></td>
                        <td>${s.owner||'未知'}</td>
                        <td><strong>${title}</strong></td>
                        <td><span class="badge">${s.targetType==='note'?'笔记':'文件'}</span></td>
                        <td>${new Date(s.createdAt).toLocaleDateString()}</td>
                        <td>${s.expiresAt ? (isExpired?'<span style="color:var(--red)">已过期</span>':new Date(s.expiresAt).toLocaleDateString()):'永久'}</td>
                        <td>${isExpired?'<span style="color:var(--red)">已过期</span>':(s.public==1?'<span style="color:var(--green)">公开</span>':'<span style="color:var(--gray)">私有</span>')}</td>
                        <td style="text-align:right">
                            <button class="tool-btn" onclick="copyShareLink('${shareUrl}')" style="padding:2px 6px;font-size:9px">复制</button>
                            <button class="tool-btn" onclick="revokeShare('${s.token}','${title.replace(/'/g, "\\'")}')" style="color:var(--red);border-color:var(--red);padding:2px 6px;font-size:9px">撤销</button>
                        </td>
                    </tr>`;
            }).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--gray);padding:10px;font-size:10px">暂无分享内容</td></tr>';
        } catch(e) { document.getElementById('shareList').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--red);padding:10px">加载失败</td></tr>'; }
    }

    function copyShareLink(url) { navigator.clipboard.writeText(url).then(() => alert('分享链接已复制')).catch(() => prompt('分享链接：', url)); }

    async function revokeShare(token, title) {
        if (!confirm(`确定撤销分享 "${title}" 吗？`)) return;
        const res = await fetch('/api/share/revoke', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
        const data = await res.json();
        res.ok ? (alert('分享已撤销'), loadShares()) : alert('撤销失败：' + (data?.error || '未知错误'));
    }

    function toggleSelectAllShares(master) { document.querySelectorAll('.share-checkbox').forEach(cb => cb.checked = master.checked); }

    async function batchDeleteShares() {
        const tokens = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => cb.value);
        if (!tokens.length || !confirm(`确认删除这 ${tokens.length} 个分享？`)) return;
        const res = await fetch('/api/share/batch-revoke', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tokens }) });
        if (res.ok && (await res.json()).status === 'ok') { alert(`已删除 ${tokens.length} 个分享`); loadShares(); }
    }

    // 内容审计
    async function loadNotes(page = 1) {
        try {
            const res = await fetch(`/api/admin/notes/all?page=${page}&limit=15&search=${encodeURIComponent(document.getElementById('noteSearch').value)}`);
            const data = await res.json();
            currentPage = data.page; totalPages = data.totalPages;
            document.getElementById('noteList').innerHTML = data.notes.map(n => `
                <tr>
                    <td><input type="checkbox" class="note-checkbox" value="${n.id}"></td>
                    <td>${n.username}</td>
                    <td>${n.title||'无标题'}</td>
                    <td>${n.deleted?'<span style="color:var(--red)">已删除</span>':'活跃'}</td>
                    <td style="text-align:right"><button class="tool-btn" onclick="deleteNote('${n.id}')" style="color:var(--red);border-color:var(--red);padding:2px 6px;font-size:9px">销毁</button></td>
                </tr>`).join('');
            document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages||1} 页`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        } catch(e) {}
    }

    function debounceNoteSearch() { clearTimeout(noteSearchTimer); noteSearchTimer = setTimeout(() => loadNotes(1), 500); }
    function changePage(delta) { const t = currentPage + delta; if(t >= 1 && t <= totalPages) loadNotes(t); }
    function toggleSelectAll(master) { document.querySelectorAll('.note-checkbox').forEach(cb => cb.checked = master.checked); }

    async function batchDeleteNotes() {
        const ids = Array.from(document.querySelectorAll('.note-checkbox:checked')).map(cb => cb.value);
        if (!ids.length || !confirm(`确认销毁这 ${ids.length} 篇笔记？`)) return;
        for (const id of ids) await fetch(`/api/admin/notes/${id}`, { method: 'DELETE' });
        loadNotes(currentPage);
    }

    async function deleteNote(id) {
        if(confirm('确认销毁此笔记？')) { await fetch(`/api/admin/notes/${id}`, { method: 'DELETE' }); loadNotes(currentPage); }
    }

    async function emptyAllTrash() {
        if(!confirm('确定要清空所有用户的回收站吗？此操作不可撤销。')) return;
        const res = await fetch('/api/admin/trash/empty-all', { method: 'DELETE' });
        const data = await res.json();
        if(res.ok) { alert(`已清空 ${data.count} 条回收站记录`); loadNotes(currentPage); }
    }

    // 弹窗
    function showAddUser() {
        const inputs = `<input id="newU" placeholder="用户名" required autocomplete="username"><input id="newE" type="email" placeholder="邮箱地址" required autocomplete="email"><input id="newP" type="password" placeholder="初始密码" required autocomplete="new-password">`;
        openModal('新增用户', inputs, async (e) => {
            e.preventDefault();
            const res = await fetch('/api/admin/users/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: document.getElementById('newU').value, email: document.getElementById('newE').value, password: document.getElementById('newP').value }) });
            if(res.ok) { closeModal(); loadUsers(); } else alert('创建失败，用户名可能已存在');
        });
    }

    function resetPass(username) {
        openModal(`重置密码: ${username}`, `<input id="newP" type="password" placeholder="输入新密码" required autocomplete="new-password">`, async (e) => {
            e.preventDefault();
            await fetch('/api/admin/users/reset-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username, newPassword: document.getElementById('newP').value }) });
            closeModal(); alert('密码已更新');
        });
    }

    function openModal(title, html, onSubmit) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalInputs').innerHTML = html;
        document.getElementById('modal-form').onsubmit = onSubmit;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => { loadBackupConfig(); loadUsers(); loadShares(); loadNotes(); loadDatabaseInfo(); });
</script>

</body>
</html>
