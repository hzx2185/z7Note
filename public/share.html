<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z7Note - 分享详情</title>
    <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
    <link rel="stylesheet" href="/css/app.css?v=20260612-release-109">
    <link rel="stylesheet" href="/cdn/github-markdown.min.css">
    <link rel="stylesheet" href="/cdn/highlight-light.min.css">
    <script src="/cdn/marked.min.js" defer></script>
    <script src="/cdn/dompurify.min.js" defer></script>
    <script src="/cdn/highlight.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: auto !important;
            min-height: 100vh;
            overflow: auto !important;
            width: 100%;
        }

        body > .header {
            position: sticky !important;
            top: 0 !important;
            left: auto !important;
            right: auto !important;
            width: 100% !important;
            height: auto !important;
            max-width: none !important;
            padding: 14px 20px !important;
            background: color-mix(in srgb, var(--panel, var(--bg)) 88%, transparent);
            border-bottom: 1px solid var(--border);
            z-index: 100 !important;
            backdrop-filter: blur(14px);
        }

        body > .container {
            position: static !important;
            overflow: visible !important;
            padding-top: 24px !important;
            padding-bottom: 24px !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
            width: 100% !important;
            max-width: 900px !important;
            margin: 0 auto !important;
            display: block !important;
        }

        body {
            font-family: var(--font-site);
            background:
                radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 12%, transparent), transparent 26%),
                linear-gradient(180deg, color-mix(in srgb, var(--bg) 90%, #fff 10%) 0%, var(--bg) 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .header a { color: var(--accent); text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }
        .content-card {
            background: color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .share-hidden {
            display: none !important;
        }

        .share-visible {
            display: block !important;
        }
        .content-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .content-header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .content-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--muted, var(--gray));
        }
        .content-meta span {
            background: color-mix(in srgb, var(--panel-strong, var(--bg)) 94%, transparent);
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
        }
        .content-body {
            padding: 24px;
        }
        .content-body.markdown-body {
            background: transparent;
        }
        .loading, .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        .error { color: var(--red); }

        /* 修复白天模式 markdown 字体颜色 */
        .markdown-body {
            color: var(--text) !important;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            color: var(--text) !important;
        }
        .markdown-body p,
        .markdown-body li,
        .markdown-body td,
        .markdown-body th {
            color: var(--text) !important;
        }
        .markdown-body a {
            color: var(--accent) !important;
        }
        .markdown-body code {
            color: var(--text) !important;
        }
        .markdown-body pre {
            background: var(--bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 14px !important;
        }

        .file-preview {
            text-align: center;
            padding: 40px;
        }
        .file-preview img {
            max-width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 11px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }
        .download-btn:hover { opacity: 0.9; }

        .pdf-preview-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            max-height: 800px;
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            background: var(--bg);
        }
        .pdf-preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .pdf-preview-frame {
            width: 100%;
            max-width: 100%;
            height: 70vh;
            min-height: 400px;
            max-height: 800px;
            border: none;
            display: block;
            overflow: hidden;
        }
        .pdf-placeholder {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: color-mix(in srgb, var(--panel, var(--bg)) 90%, transparent);
            border-radius: 18px;
            border: 1px solid var(--border);
        }
        .pdf-placeholder:hover {
            border-color: var(--accent);
        }
        .pdf-placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .pdf-placeholder-text {
            font-size: 14px;
            color: var(--text);
        }
        .pdf-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            min-height: 400px;
            max-height: 800px;
        }
        .pdf-loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .pdf-loading-text {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text);
        }

        .pdf-download-wrap {
            text-align: center;
        }

        .pdf-error-state {
            padding: 20px;
            text-align: center;
        }

        .pdf-error-icon,
        .file-generic-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .pdf-error-text {
            font-size: 16px;
            color: var(--red);
        }

        .file-generic-name {
            font-size: 16px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .pdf-preview-container,
            .pdf-placeholder,
            .pdf-loading {
                height: 60vh;
                min-height: 300px;
                max-height: 600px;
            }
        }
        @media (max-width: 480px) {
            .pdf-preview-container,
            .pdf-placeholder,
            .pdf-loading {
                height: 50vh;
                min-height: 250px;
                max-height: 500px;
            }
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .nav-links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
        .nav-links a:hover { text-decoration: underline; }
        .nav-links a.disabled {
            color: var(--gray);
            pointer-events: none;
        }

        /* 分类笔记列表 */
        .note-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .note-item {
            background: color-mix(in srgb, var(--panel-strong, var(--bg)) 95%, transparent);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .note-item a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
        .note-item a:hover { text-decoration: underline; }
        .note-item .date {
            font-size: 12px;
            color: var(--gray);
        }

        .note-link-disabled {
            color: var(--gray) !important;
            cursor: not-allowed;
            pointer-events: none;
            text-decoration: none !important;
        }

        .theme-toggle {
            min-width: 54px;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 999px;
        }

        @media (max-width: 640px) {
            .content-header h1 { font-size: 18px; }
            .container { padding: 16px; }
            .header-content { flex-wrap: wrap; }
        }
    </style>
</head>
<body data-ui-surface="app" data-theme="default">
    <div class="header">
        <div class="header-content">
            <a href="/shares.html" id="back-link">← 分享中心</a>
            <div data-theme-slot data-theme-mode="compact" data-theme-button-class="btn btn-secondary theme-toggle"></div>
        </div>
    </div>

    <div class="container">
        <div class="content-card share-hidden" id="content-card">
            <div class="content-header">
                <h1 id="title">加载中...</h1>
                <div class="content-meta" id="meta"></div>
            </div>
            <div class="content-body" id="content">
                <div class="loading">⏳ 加载中...</div>
            </div>
        </div>

        <div class="nav-links share-hidden" id="nav-links">
            <a href="#" id="prev-link">← 上一篇</a>
            <a href="#" id="next-link">下一篇 →</a>
        </div>

        <div class="loading" id="loading">⏳ 加载中...</div>
        <div class="error share-hidden" id="error"></div>
    </div>

    <script src="/js/share-page.js?v=20260612-release-109"></script>
</body>
</html>
