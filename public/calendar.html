<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历 - z7Note</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
  <div id="calendar-app">
    <!-- 顶部导航 -->
    <div class="calendar-header">
      <div class="calendar-nav calendar-nav-left">
        <button class="secondary" id="prev-month">←</button>
        <span class="calendar-title" id="current-month"></span>
        <button class="secondary" id="next-month">→</button>
        <button class="secondary" id="today-btn">今天</button>
      </div>
      <div class="calendar-nav calendar-nav-right">
        <button class="secondary" id="subscription-btn" title="订阅">📅</button>
        <button class="secondary" id="export-btn" title="导出">📤</button>
        <button class="secondary" id="import-btn" title="导入">📥</button>
        <button class="secondary" id="reminder-toggle-btn" title="提醒开关">🔔</button>
        <button class="add-btn" id="new-event-btn">➕</button>
      </div>
    </div>

    <!-- 主体区域 -->
    <div class="calendar-main">
      <!-- 月视图 -->
      <div class="month-view" id="month-view">
        <div class="month-view-headers">
          <div class="month-day-header">日</div>
          <div class="month-day-header">一</div>
          <div class="month-day-header">二</div>
          <div class="month-day-header">三</div>
          <div class="month-day-header">四</div>
          <div class="month-day-header">五</div>
          <div class="month-day-header">六</div>
        </div>
        <div class="month-view-grid" id="month-view-grid"></div>
      </div>

      <!-- 侧边栏 -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" id="sidebar-date">选择日期</span>
          <div class="sidebar-header-actions">
            <button class="icon-btn" id="todo-add-btn" title="添加待办">☑</button>
            <button class="icon-btn" id="event-add-btn" title="添加事件">📅</button>
          </div>
        </div>
        <input type="text" id="sidebar-search" class="sidebar-search" placeholder="搜索...">
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="all">全部</button>
          <button class="sidebar-tab" data-tab="event">事件</button>
          <button class="sidebar-tab" data-tab="todo">待办</button>
          <button class="sidebar-tab" data-tab="note">笔记</button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
      </div>
    </div>

    <!-- 未登录提示 -->
    <div id="login-required">
      <h2>需要登录</h2>
      <p>请登录后查看日历内容</p>
      <a href="/">返回首页登录</a>
    </div>
  </div>

  <!-- 待办模态框 -->
  <div class="modal-overlay" id="todo-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">添加待办</h3>
        <button class="modal-close todo-modal-close">×</button>
      </div>
      <form id="todo-form">
        <div class="form-group">
          <label class="form-label">标题 *</label>
          <input type="text" class="form-input" name="title" required placeholder="输入待办事项标题">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea" name="description" placeholder="添加详细描述（可选）"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group form-group-narrow">
            <label class="form-label">优先级</label>
            <select class="form-select" name="priority">
              <option value="1">低</option>
              <option value="2" selected>中</option>
              <option value="3">高</option>
            </select>
          </div>
          <div class="form-group form-group-narrow">
            <label class="form-label">截止日期</label>
            <input type="date" class="form-input" name="dueDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group-narrow">
            <label class="form-label">提醒时间</label>
            <select class="form-select" name="reminderTime">
              <option value="0,0,15">提前15分钟</option>
              <option value="0,1,0">提前1小时</option>
              <option value="0,2,0">提前2小时</option>
              <option value="1,0,0" selected>提前1天</option>
              <option value="2,0,0">提前2天</option>
              <option value="7,0,0">提前7天</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">提醒方式</label>
            <div class="reminder-options">
              <label class="reminder-option"><input type="checkbox" name="reminderEmail" value="1" checked> 邮件</label>
              <label class="reminder-option"><input type="checkbox" name="reminderBrowser" value="1" checked> 浏览器通知</label>
              <label class="reminder-option"><input type="checkbox" name="reminderCaldav" value="1"> 日历应用</label>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary todo-modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 事件模态框 -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">添加事件</h3>
        <button class="modal-close event-modal-close">×</button>
      </div>
      <form id="event-form">
        <div class="form-group">
          <label class="form-label">标题 *</label>
          <input type="text" class="form-input" name="title" required placeholder="输入事件标题">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea" name="description" placeholder="添加详细描述（可选）"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group form-group-half">
            <label class="form-label">开始时间 *</label>
            <input type="datetime-local" class="form-input" name="startTime" required>
          </div>
          <div class="form-group form-group-half">
            <label class="form-label">结束时间</label>
            <input type="datetime-local" class="form-input" name="endTime">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group-narrow">
            <label class="form-label">全天</label>
            <select class="form-select" name="allDay">
              <option value="false">否</option>
              <option value="true" selected>是</option>
            </select>
          </div>
          <div class="form-group form-group-narrow">
            <label class="form-label">颜色</label>
            <input type="color" class="form-input" name="color" value="#2563eb">
          </div>
          <div class="form-group">
            <label class="form-label">重复</label>
            <select class="form-select" name="recurrence" id="recurrence-select">
              <option value="">不重复</option>
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月(公历)</option>
              <option value="yearly">每年(公历)</option>
              <option value="lunar_monthly">每月(农历)</option>
              <option value="lunar_yearly">每年(农历)</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="recurrence-end-group" style="display: none;">
          <label class="form-label">重复结束日期</label>
          <input type="date" class="form-input" name="recurrenceEnd" id="recurrence-end">
        </div>
        <div class="form-row">
          <div class="form-group form-group-narrow">
            <label class="form-label">提醒时间</label>
            <select class="form-select" name="reminderTime">
              <option value="0,0,15">提前15分钟</option>
              <option value="0,1,0">提前1小时</option>
              <option value="0,2,0">提前2小时</option>
              <option value="1,0,0" selected>提前1天</option>
              <option value="2,0,0">提前2天</option>
              <option value="7,0,0">提前7天</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">提醒方式</label>
            <div class="reminder-options">
              <label class="reminder-option"><input type="checkbox" name="reminderEmail" value="1" checked> 邮件</label>
              <label class="reminder-option"><input type="checkbox" name="reminderBrowser" value="1" checked> 浏览器通知</label>
              <label class="reminder-option"><input type="checkbox" name="reminderCaldav" value="1"> 日历应用</label>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary event-modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 订阅管理模态框 -->
  <div class="modal-overlay" id="subscription-modal">
    <div class="modal" style="width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title">日历订阅管理</h3>
        <button class="modal-close subscription-modal-close">×</button>
      </div>
      <div style="margin-bottom: 16px;">
        <button type="button" class="btn btn-primary" id="add-subscription-btn">添加订阅</button>
      </div>
      <div id="subscription-list" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- 订阅表单模态框 -->
  <div class="modal-overlay" id="subscription-form-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="subscription-form-title">添加订阅</h3>
        <button class="modal-close subscription-form-modal-close">×</button>
      </div>
      <form id="subscription-form">
        <div class="form-group">
          <label class="form-label">名称 *</label>
          <input type="text" class="form-input" name="name" required placeholder="例如：中国节假日">
        </div>
        <div class="form-group">
          <label class="form-label">ICS URL *</label>
          <input type="url" class="form-input" name="url" required placeholder="https://example.com/calendar.ics">
          <small style="color: var(--text-secondary); font-size: 11px;">支持中国节假日: https://calendar.google.com/calendar/ical/zh.china%23holiday%40group.v.calendar.google.com/public/basic.ics</small>
        </div>
        <div class="form-group">
          <label class="form-label">颜色</label>
          <input type="color" class="form-input" name="color" value="#6366f1">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary subscription-form-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <input type="file" id="ics-file-input" accept=".ics" style="display: none;">

  <script>
  // 浏览器通知
  (function() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'reminder') {
        const { itemType, item } = event.data;
        if (Notification.permission === 'granted') {
          new Notification(itemType === 'event' ? '📅 事件提醒' : '✅ 待办提醒', {
            body: `${item.title}\n⏰ ${item.timeStr || ''}`,
            icon: '/favicon.ico'
          });
        }
      }
    });
  })();
  </script>
  <script src="/js/calendar.js?v=4"></script>
</body>
</html>
