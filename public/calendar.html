<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历 - z7Note</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>?v=20250312-FINAL-FIX">
  <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body data-ui-surface="app" data-theme="default" class="workspace-shell calendar-page">
  <div class="header workspace-header workspace-brand-header">
    <div class="workspace-header-group">
      <b class="workspace-title workspace-brand-title">日历 <span class="workspace-month-label workspace-brand-highlight hidden" id="current-month"></span></b>
    </div>
    <div class="header-toolbar workspace-header-group workspace-actions workspace-actions-scroll">
      <div class="workspace-top-nav" aria-label="页面切换">
        <a id="nav-home-btn" class="tool-btn workspace-nav-btn" href="/" title="首页">⌂</a>
        <a id="nav-notes-btn" class="tool-btn workspace-nav-btn" href="/app" title="笔记">✎</a>
        <a id="nav-calendar-btn" class="tool-btn workspace-nav-btn workspace-nav-btn-active" href="/calendar.html" title="日历">◷</a>
        <a id="nav-contacts-btn" class="tool-btn workspace-nav-btn" href="/contacts.html" title="通讯录">☏</a>
        <a id="nav-member-btn" class="tool-btn workspace-nav-btn" href="/member" title="会员中心">★</a>
      </div>
      <div data-theme-slot data-theme-mode="compact" data-theme-button-class="tool-btn"></div>
    </div>
  </div>

  <div class="main workspace-main workspace-main-offset">
    <div class="month-view workspace-content workspace-brand-panel" id="month-view">
      <div id="mobile-calendar-toggle">📅 选择日期 (点击展开/收起)</div>
      <div class="month-view-headers">
        <div class="month-day-header">日</div><div class="month-day-header">一</div><div class="month-day-header">二</div>
        <div class="month-day-header">三</div><div class="month-day-header">四</div><div class="month-day-header">五</div>
        <div class="month-day-header">六</div>
      </div>
      <div class="month-view-grid" id="month-view-grid"></div>
    </div>

    <div class="sidebar workspace-sidebar workspace-brand-sidebar" data-workspace-role="sidebar">
      <div class="sidebar-header workspace-side-header">
        <div class="sidebar-header-row workspace-side-header-row">
          <div class="sidebar-date-title">
            <span class="sidebar-title workspace-side-title workspace-side-title-lg" id="sidebar-date">选择日期</span>
            <span id="sidebar-lunar" class="workspace-side-meta"></span>
            <div class="date-quick-actions">
              <button class="tool-btn tool-btn-xs" id="batch-add-text-btn" title="批量添加" aria-label="批量添加">≣</button>
              <button class="tool-btn tool-btn-xs" id="todo-add-btn" title="添加待办" aria-label="添加待办">☑</button>
              <button class="tool-btn tool-btn-xs workspace-btn-accent" id="new-event-btn" title="添加事件" aria-label="添加事件">✦</button>
            </div>
          </div>
        </div>
        <div id="sidebar-yiji" class="workspace-text-muted workspace-meta-block">
          <div id="yiji-content" class="hidden">
            <span class="workspace-text-success">宜:</span> <span id="yiji-yi"></span>
            <span class="workspace-text-danger workspace-inline-offset">忌:</span> <span id="yiji-ji"></span>
          </div>
        </div>
      </div>

      <!-- 统计数据面板 -->
      <div id="sidebar-stats" class="stats-panel workspace-stats">
        <div class="calendar-stats-line">
          <span>事<span id="stats-events" class="workspace-stat-value">-</span></span>
          <span class="workspace-divider-faint">|</span>
          <span>待<span id="stats-todos" class="workspace-stat-value">-</span></span>
          <span class="workspace-caption-xs">(日/月/年/总)</span>
          <button class="tool-btn tool-btn-xs" id="export-btn" title="导出" aria-label="导出">↑</button>
          <button class="tool-btn tool-btn-xs" id="import-btn" title="导入" aria-label="导入">↓</button>
        </div>
      </div>

      <div class="workspace-panel workspace-brand-panel workspace-action-strip calendar-action-strip">
        <div class="workspace-action-group calendar-nav-buttons">
          <input type="number" id="jump-year" class="date-input date-input-year" placeholder="年">
          <button class="tool-btn" id="prev-month" title="上个月">‹</button>
          <input type="number" id="jump-month" class="date-input date-input-month" placeholder="月" min="1" max="12">
          <button class="tool-btn" id="next-month" title="下个月">›</button>
          <button id="jump-btn" class="tool-btn" title="跳转到年月" aria-label="跳转到年月">↦</button>
          <button class="tool-btn" id="subscription-btn" title="订阅管理" aria-label="订阅管理">⌁</button>
          <button class="tool-btn" id="reminder-settings-btn" title="提醒设置" aria-label="提醒设置" onclick="window.location.href='/reminder-settings.html'">⏰</button>
        </div>
      </div>

      <div class="sidebar-search-bar">
        <button class="tool-btn" id="batch-select-btn" title="批量选择" aria-label="批量选择">☷</button>
        <div class="sidebar-search workspace-search">
          <input type="text" id="sidebar-search" class="workspace-search-input" placeholder="搜索...">
          <button type="button" id="sidebar-search-clear" class="search-clear-btn" style="display: none;">&times;</button>
        </div>
      </div>
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="all">全部</div>
        <div class="sidebar-tab" data-tab="event">事件</div>
        <div class="sidebar-tab" data-tab="todo">
          待办
          <span id="incomplete-count" class="workspace-badge-count">0</span>
        </div>
        <div class="sidebar-tab" data-tab="note">笔记</div>
      </div>
      <div class="sidebar-subfilters hidden" id="event-subfilters">
        <label>
          <input type="checkbox" id="sidebar-recurring-only">
          <span>只看重复</span>
        </label>
      </div>
      <!-- 批量操作工具栏 -->
      <div class="batch-actions-bar" id="batch-actions-bar">
        <input type="checkbox" id="select-all-checkbox" class="workspace-check-sm">
        <span id="selected-count" class="workspace-batch-count">0项</span>
        <button id="batch-format-btn" class="batch-btn format">修复</button>
        <button id="batch-cleanup-btn" class="batch-btn cleanup">去重</button>
        <button id="batch-delete-btn" class="batch-btn delete">删除</button>
        <button id="batch-clear-btn" class="batch-btn delete">清空</button>
        <button id="cancel-select-btn" class="batch-btn cancel">取消</button>
      </div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </div>
  </div>

  <!-- 未登录提示 -->
  <div id="login-required">
    <h2>需要登录</h2>
    <p class="workspace-hint-block">请登录后查看日历内容</p>
    <button class="btn btn-primary" onclick="location.href='/login.html'">返回登录</button>
  </div>

  <!-- 待办 -->
  <div class="modal workspace-brand-modal" id="todo-modal">
    <div class="modal-content md workspace-modal-card-md">
      <div class="modal-header"><h3 class="modal-title">添加待办</h3><button class="todo-modal-close">×</button></div>
      <form id="todo-form" class="modal-body workspace-form">
        <div class="form-group"><label>标题 *</label><input name="title" required></div>
        <div class="form-group"><label>描述</label><textarea name="description" rows="2"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>全天</label><select name="allDay" id="todo-allDay-select"><option value="false">否</option><option value="true" selected>是</option></select></div>
          <div class="form-group"><label>优先级</label><select name="priority"><option value="1">低</option><option value="2" selected>中</option><option value="3">高</option></select></div>
        </div>
        <div class="form-row datetime-row hidden" id="todo-datetime-row">
          <div class="form-group"><label>开始时间</label><input type="datetime-local" name="startTime"></div>
          <div class="form-group"><label>截止时间</label><input type="datetime-local" name="dueDate"></div>
        </div>
        <div class="form-row dates-row" id="todo-date-row">
          <div class="form-group"><label>开始日期</label><input type="date" name="startDate"></div>
          <div class="form-group"><label>截止日期</label><input type="date" name="dueDateDate"></div>
        </div>
        <div class="form-group reminder-group"><label>提醒方式</label>
          <select name="reminderPreset" id="todo-reminderPreset"><option value="none">无提醒</option><option value="15m">提前15分钟</option><option value="same_day_9am" selected>当天09:00</option><option value="one_day_9am">提前1天09:00</option></select>
          <div class="checkbox-row compact">
            <label><input type="checkbox" name="reminderEmail" value="1" checked class="workspace-check-inline"> 邮件</label>
            <label><input type="checkbox" name="reminderBrowser" value="1" checked class="workspace-check-inline"> 浏览器</label>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary todo-modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 事件 -->
  <div class="modal workspace-brand-modal" id="event-modal">
    <div class="modal-content md workspace-modal-card-md">
      <div class="modal-header"><h3 class="modal-title">添加事件</h3><button class="event-modal-close">×</button></div>
      <form id="event-form" class="modal-body workspace-form">
        <div class="form-group"><label>标题 *</label><input name="title" required></div>
        <div class="form-group"><label>描述</label><textarea name="description" rows="2"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>全天</label><select name="allDay" id="allDay-select"><option value="false">否</option><option value="true" selected>是</option></select></div>
            <div class="form-group"><label>重复</label>
              <div class="field-inline">
                <select name="recurrence" id="recurrence-select">
                  <option value="">不重复</option><option value="daily">每天</option><option value="weekly">每周</option><option value="monthly">每月</option><option value="yearly">每年</option>
                </select>
                <label id="lunar-checkbox-wrap" class="field-inline-label hidden">
                  <input type="checkbox" name="isLunar" id="isLunar-checkbox" class="workspace-check-compact"> 农历
                </label>
              </div>
            </div>
          </div>
          <div class="form-row datetime-row hidden" id="datetime-row">
            <div class="form-group"><label>开始 *</label><input type="datetime-local" name="startTime" required></div>
            <div class="form-group"><label>结束</label><input type="datetime-local" name="endTime"></div>
          </div>
          <div class="form-row dates-row" id="date-row">
            <div class="form-group"><label>开始日期 *</label><input type="date" name="startDate" required></div>
            <div class="form-group"><label>结束日期</label><input type="date" name="endDate"></div>
          </div>
        <div class="form-group hidden" id="recurrence-end-group">
          <label>重复至</label>
          <input type="date" name="recurrenceEnd">
          <div class="field-hint">包含当天，留空则持续重复</div>
        </div>
        <div class="form-group reminder-group"><label>提醒</label>
          <select name="reminderPreset" id="event-reminderPreset" class="workspace-select-compact"><option value="none">无提醒</option><option value="15m">提前15分钟</option><option value="same_day_9am" selected>当天09:00</option><option value="one_day_9am">提前1天09:00</option></select>
          <div class="checkbox-row compact">
            <label><input type="checkbox" name="reminderEmail" value="1" checked class="workspace-check-inline"> 邮件</label>
            <label><input type="checkbox" name="reminderBrowser" value="1" checked class="workspace-check-inline"> 浏览器</label>
            <label><input type="checkbox" name="reminderCaldav" value="1" checked class="workspace-check-inline"> 日历应用</label>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary event-modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 订阅管理 -->
  <div class="modal workspace-brand-modal" id="subscription-modal">
    <div class="modal-content lg workspace-modal-card-lg">
      <div class="modal-header"><h3>订阅管理</h3><button class="subscription-modal-close">×</button></div>
      <div class="modal-body">
        <button class="btn btn-primary w-full mb-2" id="add-subscription-btn">添加新订阅</button>
        <div id="subscription-list" class="workspace-scroll-panel-sm"></div>
      </div>
    </div>
  </div>

  <!-- 订阅表单 -->
  <div class="modal workspace-brand-modal" id="subscription-form-modal">
    <div class="modal-content md workspace-modal-card-md">
      <div class="modal-header"><h3 id="subscription-form-title">订阅日历</h3><button class="subscription-form-modal-close">×</button></div>
      <form id="subscription-form" class="modal-body workspace-form">
        <div class="form-group"><label>名称 *</label><input name="name" required></div>
        <div class="form-group"><label>URL *</label><input type="url" name="url" required></div>
        <div class="form-group"><label>颜色</label><input type="color" name="color" value="#6366f1" class="workspace-color-input"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary subscription-form-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 批量添加文本 -->
  <div class="modal workspace-brand-modal" id="batch-text-modal">
    <div class="modal-content lg workspace-modal-card-lg">
      <div class="modal-header">
        <h3 class="workspace-title">批量添加</h3>
        <button class="batch-text-modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <textarea id="batch-text-input" rows="8" class="workspace-textarea-lg" placeholder="格式: 日期 标题 (每行一条)&#10;3.15 买菜&#10;明天 下午开会"></textarea>
        </div>

        <div class="form-group workspace-controls-inline">
          <div class="workspace-choice-row">
            <label class="workspace-choice-label">类型:</label>
            <label class="workspace-option-label"><input type="radio" name="batch-type" value="event" checked class="workspace-check-inline"> 事件</label>
            <label class="workspace-option-label"><input type="radio" name="batch-type" value="todo" class="workspace-check-inline"> 待办</label>
          </div>
          <button type="button" class="btn btn-primary workspace-btn-inline-sm" id="batch-preview-btn">预览</button>
        </div>

        <div id="batch-preview-area" class="hidden workspace-preview-area">
          <div id="batch-preview-list" class="workspace-preview-list"></div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary batch-text-modal-cancel">取消</button>
          <button type="button" class="btn btn-primary" id="batch-import-btn" disabled>导入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 确认对话框 (精简版) -->
  <div class="modal workspace-brand-modal" id="confirm-modal">
    <div class="modal-content sm">
      <div class="modal-body workspace-modal-body-tight">
        <p id="confirm-message" class="confirm-message"></p>
        <div id="confirm-extra" class="hidden workspace-confirm-extra">
          <label class="workspace-confirm-label">
            <input type="checkbox" id="confirm-checkbox" class="workspace-confirm-checkbox">
            <span id="confirm-checkbox-label"></span>
          </label>
        </div>
        <div class="modal-actions workspace-modal-actions-inline" id="confirm-actions">
          <button type="button" class="btn" id="confirm-cancel">取消</button>
          <button type="button" class="btn btn-primary workspace-danger-fill" id="confirm-ok">确定</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="ics-file-input" accept=".ics" class="hidden-file-input">
  <input type="file" id="todos-file-input" accept=".json" class="hidden-file-input">
  <input type="file" id="reminders-file-input" accept=".json" class="hidden-file-input">
  <script type="module" src="/js/calendar-entry.js"></script>
  <script src="/js/notification-handler.js?v=20260320-CALENDAR-FILTERS"></script>
  <script src="/js/calendar-utils.js?v=20260605-enhance-search-details-v2"></script>
  <script src="/js/calendar-api.js?v=20260430-split-calendar-api"></script>
  <script src="/js/calendar-sidebar-loader.js?v=20260511-no-sidebar-scroll-load"></script>
  <script src="/js/calendar-sidebar.js?v=20260605-enhance-search-details-v4"></script>
  <script src="/js/calendar-render.js?v=20260605-enhance-search-details-v3"></script>
  <script src="/js/calendar-batch.js?v=20260430-split-calendar-batch"></script>
  <script src="/js/calendar-forms.js?v=20260430-split-calendar-forms"></script>
  <script src="/js/calendar-item-handlers.js?v=20260430-split-calendar-items"></script>
  <script src="/js/calendar-import-export.js?v=20260430-split-calendar-import-export"></script>
  <script src="/js/calendar-subscriptions.js?v=20260430-split-calendar-subscriptions"></script>
  <script src="/js/calendar.js?v=20260605-enhance-search-details-v3"></script>
</body>
</html>
