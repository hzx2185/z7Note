<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系人 - z7Note</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: auto; }

    .contacts-app { display: flex; flex-direction: column; height: 100vh; }

    /* 顶部导航 */
    .contacts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg-secondary, #f5f5f5);
      border-bottom: 1px solid var(--border-color, #ddd);
    }

    .contacts-nav-left, .contacts-nav-right { display: flex; align-items: center; gap: 8px; }
    .contacts-title { font-size: 16px; font-weight: 600; }

    .search-input {
      padding: 6px 10px;
      border: 1px solid var(--border-color, #ddd);
      border-radius: 4px;
      width: 180px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }

    /* 主体区域 */
    .contacts-main { display: flex; flex: 1; overflow: hidden; }

    /* 联系人列表 */
    .contacts-list {
      width: 260px;
      border-right: 1px solid var(--border-color, #ddd);
      overflow-y: auto;
      background: #fff;
    }

    .contact-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color, #eee);
      transition: background 0.2s;
    }

    .contact-item:hover { background: var(--bg-hover, #f0f0f0); }
    .contact-item.active { background: var(--bg-active, #e3f2fd); }

    .contact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-color, #2563eb);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-org { font-size: 11px; color: var(--text-secondary, #666); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 联系人详情 */
    .contact-detail {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fff;
    }

    .detail-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color, #eee);
    }

    .detail-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--primary-color, #2563eb);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
      margin-right: 16px;
    }

    .detail-title { flex: 1; }
    .detail-name { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
    .detail-org { font-size: 13px; color: var(--text-secondary, #666); }
    .detail-actions { display: flex; gap: 6px; }

    .detail-section { margin-bottom: 16px; }
    .detail-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary, #666); margin-bottom: 8px; text-transform: uppercase; }

    .detail-row { display: flex; align-items: center; padding: 4px 0; }
    .detail-label { width: 60px; color: var(--text-secondary, #666); font-size: 13px; }
    .detail-value { flex: 1; font-size: 13px; }
    .detail-value a { color: var(--primary-color, #2563eb); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary, #666);
    }

    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* 电话/邮箱列表 */
    .multi-input-list { margin-bottom: 6px; }
    .multi-input-item { display: flex; gap: 6px; margin-bottom: 6px; }
    .multi-input-item select { width: 80px; }
    .multi-input-item input { flex: 1; }
    .multi-input-item button { padding: 6px 10px; }

    .add-item-btn {
      background: none;
      border: 1px dashed var(--border-color, #ddd);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-secondary, #666);
      width: 100%;
      font-size: 13px;
    }
    .add-item-btn:hover { border-color: var(--primary-color, #2563eb); color: var(--primary-color, #2563eb); }

    /* 返回按钮 */
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary, #666);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { color: var(--primary-color, #2563eb); }

    /* 模态框样式 - 覆盖全局样式 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding-top: 5vh;
      z-index: 10000;
      overflow-y: auto;
    }
    .modal-overlay.show { display: flex !important; }

    /* 覆盖 base.css 中的 .modal 样式 */
    .modal-overlay > .modal {
      display: block !important;
      position: relative !important;
      inset: auto !important;
      z-index: auto !important;
      background: var(--bg, #fff) !important;
      padding: 12px;
      border-radius: 6px;
      width: 380px;
      max-width: 94vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.3);
      margin-bottom: 5vh;
    }

    .modal-overlay .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 0;
      border: none;
      background: transparent;
    }

    .modal-overlay .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text, #333);
      margin: 0;
    }

    .modal-overlay .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary, #666);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .modal-overlay .modal-close:hover { background: var(--bg-secondary, #f0f0f0); }

    .modal-overlay .modal-body { font-size: 13px; padding: 0; }

    .modal-overlay .modal-footer {
      display: flex !important;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-color, #ddd);
    }

    .form-group { margin-bottom: 8px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary, #666); }
    .form-input, .form-textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border-color, #ddd);
      border-radius: 4px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }
    .form-textarea { min-height: 60px; resize: vertical; }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }

    /* 暗色主题 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-hover: #3d3d3d;
        --bg-active: #1e3a5f;
        --text-primary: #e5e5e5;
        --text-secondary: #999;
        --border-color: #444;
      }
      .contacts-list, .contact-detail, .contacts-header { background: var(--bg); }
    }

    /* 移动端响应式 */
    @media (max-width: 768px) {
      .contacts-header { flex-wrap: wrap; padding: 8px; }
      .contacts-nav-left { width: 100%; justify-content: space-between; margin-bottom: 8px; }
      .contacts-nav-right { width: 100%; flex-wrap: wrap; gap: 6px; }
      .search-input { width: 100%; order: -1; margin-bottom: 6px; }
      .contacts-nav-right .btn { flex: 1; min-width: 50px; font-size: 12px; padding: 6px 8px; }
      .contacts-main { flex-direction: column; }
      .contacts-list { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border-color, #ddd); }
      .contact-detail { height: 60vh; padding: 12px; }
      .detail-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .detail-actions { width: 100%; justify-content: space-between; }
      .detail-actions .btn { flex: 1; }
      .multi-input-item { flex-direction: column; }
      .multi-input-item select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="contacts-app">
    <!-- 顶部导航 -->
    <div class="contacts-header">
      <div class="contacts-nav-left">
        <button class="back-btn" onclick="location.href='/'">← 返回</button>
        <span class="contacts-title">联系人</span>
      </div>
      <div class="contacts-nav-right">
        <input type="text" class="search-input" id="search-input" placeholder="搜索联系人...">
        <button class="btn btn-secondary" id="import-btn">📥 导入</button>
        <button class="btn btn-secondary" id="export-btn">📤 导出</button>
        <button class="btn btn-primary" id="add-btn">➕ 添加</button>
      </div>
    </div>

    <!-- 主体区域 -->
    <div class="contacts-main">
      <div class="contacts-list" id="contacts-list"></div>
      <div class="contact-detail" id="contact-detail">
        <div class="empty-state">
          <div class="empty-icon">👤</div>
          <div class="empty-text">选择联系人查看详情</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加/编辑模态框 -->
  <div class="modal-overlay" id="contact-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">添加联系人</h3>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <form id="contact-form">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">姓</label>
              <input type="text" class="form-input" name="n_family" placeholder="姓">
            </div>
            <div class="form-group">
              <label class="form-label">名 *</label>
              <input type="text" class="form-input" name="n_given" placeholder="名" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">全名 *</label>
            <input type="text" class="form-input" name="fn" placeholder="全名" required>
          </div>

          <div class="form-group">
            <label class="form-label">电话</label>
            <div class="multi-input-list" id="tel-list"></div>
            <button type="button" class="add-item-btn" onclick="addTelItem()">+ 添加电话</button>
          </div>

          <div class="form-group">
            <label class="form-label">邮箱</label>
            <div class="multi-input-list" id="email-list"></div>
            <button type="button" class="add-item-btn" onclick="addEmailItem()">+ 添加邮箱</button>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">公司</label>
              <input type="text" class="form-input" name="org" placeholder="公司">
            </div>
            <div class="form-group">
              <label class="form-label">职位</label>
              <input type="text" class="form-input" name="title" placeholder="职位">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">网址</label>
            <input type="url" class="form-input" name="url" placeholder="https://">
          </div>

          <div class="form-group">
            <label class="form-label">生日</label>
            <input type="date" class="form-input" name="bday">
          </div>

          <div class="form-group">
            <label class="form-label">备注</label>
            <textarea class="form-textarea" name="note" placeholder="备注信息"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 导入模态框 -->
  <div class="modal-overlay" id="import-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">导入联系人</h3>
        <button class="modal-close" id="import-modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">vCard 内容</label>
          <textarea class="form-textarea" id="vcard-content" placeholder="粘贴 vCard 内容..." style="min-height: 120px;"></textarea>
        </div>
        <p style="font-size: 11px; color: var(--text-secondary, #666); margin: 6px 0;">
          支持粘贴 vCard 格式或上传 .vcf 文件
        </p>
        <input type="file" id="vcf-file" accept=".vcf">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="import-cancel">取消</button>
        <button type="button" class="btn btn-primary" id="import-confirm">导入</button>
      </div>
    </div>
  </div>

  <!-- 确认删除模态框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="width: 320px;">
      <div class="modal-header">
        <h3 class="modal-title">确认删除</h3>
        <button class="modal-close" id="confirm-modal-close">×</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message" style="margin: 0; line-height: 1.5;"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="confirm-cancel">取消</button>
        <button type="button" class="btn btn-danger" id="confirm-ok">删除</button>
      </div>
    </div>
  </div>

  <script>
    let contacts = [];
    let currentContact = null;
    let editingId = null;
    let confirmCallback = null;

    // 加载联系人列表
    async function loadContacts(search = '') {
      try {
        const url = search ? `/api/contacts?search=${encodeURIComponent(search)}` : '/api/contacts';
        const res = await fetch(url, { credentials: 'same-origin' });

        if (!res.ok) {
          if (res.status === 401) {
            contacts = [];
            renderContactsList();
            document.getElementById('contact-detail').innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">🔒</div>
                <div class="empty-text">请先登录</div>
                <a href="/login.html" style="margin-top: 8px; color: var(--accent, #2563eb);">去登录</a>
              </div>
            `;
            return;
          }
          throw new Error('加载失败');
        }

        contacts = await res.json();
        renderContactsList();
      } catch (e) {
        console.error('加载联系人失败', e);
        contacts = [];
        renderContactsList();
      }
    }

    // 渲染联系人列表
    function renderContactsList() {
      const list = document.getElementById('contacts-list');

      if (!contacts.length) {
        list.innerHTML = '<div class="empty-state" style="height: 100%;"><div class="empty-icon">👤</div><div class="empty-text">暂无联系人</div></div>';
        return;
      }

      list.innerHTML = contacts.map(c => `
        <div class="contact-item ${currentContact?.id === c.id ? 'active' : ''}" onclick="selectContact('${c.id}')">
          <div class="contact-avatar">${getInitial(c.fn || c.n_given || '?')}</div>
          <div class="contact-info">
            <div class="contact-name">${escapeHtml(c.fn || '未命名')}</div>
            <div class="contact-org">${escapeHtml(c.org || '')}</div>
          </div>
        </div>
      `).join('');
    }

    // 选择联系人
    async function selectContact(id) {
      try {
        const res = await fetch(`/api/contacts/${id}`, { credentials: 'same-origin' });
        currentContact = await res.json();
        renderContactDetail();
        renderContactsList();
      } catch (e) {
        console.error('加载联系人详情失败', e);
      }
    }

    // 渲染联系人详情
    function renderContactDetail() {
      const detail = document.getElementById('contact-detail');
      const c = currentContact;

      if (!c) {
        detail.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">选择联系人查看详情</div></div>';
        return;
      }

      let tels = [], emails = [];
      try { tels = JSON.parse(c.tel || '[]'); } catch(e) {}
      try { emails = JSON.parse(c.email || '[]'); } catch(e) {}

      detail.innerHTML = `
        <div class="detail-header">
          <div class="detail-avatar">${getInitial(c.fn || c.n_given || '?')}</div>
          <div class="detail-title">
            <div class="detail-name">${escapeHtml(c.fn || '未命名')}</div>
            <div class="detail-org">${escapeHtml(c.org || '')}${c.title ? ' · ' + escapeHtml(c.title) : ''}</div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-secondary" onclick="editContact()">编辑</button>
            <button class="btn btn-secondary" onclick="exportContact()">导出</button>
            <button class="btn btn-danger" onclick="deleteContact()">删除</button>
          </div>
        </div>
        ${tels.length ? `<div class="detail-section"><div class="detail-section-title">电话</div>${tels.map(t => `<div class="detail-row"><div class="detail-label">${escapeHtml(t.type || '电话')}</div><div class="detail-value"><a href="tel:${escapeHtml(t.value)}">${escapeHtml(t.value)}</a></div></div>`).join('')}</div>` : ''}
        ${emails.length ? `<div class="detail-section"><div class="detail-section-title">邮箱</div>${emails.map(e => `<div class="detail-row"><div class="detail-label">${escapeHtml(e.type || '邮箱')}</div><div class="detail-value"><a href="mailto:${escapeHtml(e.value)}">${escapeHtml(e.value)}</a></div></div>`).join('')}</div>` : ''}
        ${c.url ? `<div class="detail-section"><div class="detail-section-title">网址</div><div class="detail-row"><div class="detail-label">网址</div><div class="detail-value"><a href="${escapeHtml(c.url)}" target="_blank">${escapeHtml(c.url)}</a></div></div></div>` : ''}
        ${c.bday ? `<div class="detail-section"><div class="detail-section-title">生日</div><div class="detail-row"><div class="detail-label">生日</div><div class="detail-value">${escapeHtml(c.bday)}</div></div></div>` : ''}
        ${c.note ? `<div class="detail-section"><div class="detail-section-title">备注</div><div class="detail-row"><div class="detail-value" style="white-space: pre-wrap;">${escapeHtml(c.note)}</div></div></div>` : ''}
      `;
    }

    function getInitial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = '添加联系人';
      document.getElementById('contact-form').reset();
      document.getElementById('tel-list').innerHTML = '';
      document.getElementById('email-list').innerHTML = '';
      document.getElementById('contact-modal').classList.add('show');
    }

    function editContact() {
      if (!currentContact) return;
      editingId = currentContact.id;
      document.getElementById('modal-title').textContent = '编辑联系人';

      const form = document.getElementById('contact-form');
      form.n_family.value = currentContact.n_family || '';
      form.n_given.value = currentContact.n_given || '';
      form.fn.value = currentContact.fn || '';
      form.org.value = currentContact.org || '';
      form.title.value = currentContact.title || '';
      form.url.value = currentContact.url || '';
      form.bday.value = currentContact.bday || '';
      form.note.value = currentContact.note || '';

      let tels = [], emails = [];
      try { tels = JSON.parse(currentContact.tel || '[]'); } catch(e) {}
      try { emails = JSON.parse(currentContact.email || '[]'); } catch(e) {}

      const telList = document.getElementById('tel-list');
      const emailList = document.getElementById('email-list');
      telList.innerHTML = '';
      emailList.innerHTML = '';

      tels.forEach(t => addTelItem(t.type, t.value));
      emails.forEach(e => addEmailItem(e.type, e.value));

      document.getElementById('contact-modal').classList.add('show');
    }

    function addTelItem(type = 'CELL', value = '') {
      const list = document.getElementById('tel-list');
      const div = document.createElement('div');
      div.className = 'multi-input-item';
      div.innerHTML = `
        <select>
          <option value="CELL" ${type === 'CELL' ? 'selected' : ''}>手机</option>
          <option value="HOME" ${type === 'HOME' ? 'selected' : ''}>家庭</option>
          <option value="WORK" ${type === 'WORK' ? 'selected' : ''}>工作</option>
        </select>
        <input type="tel" value="${escapeHtml(value)}" placeholder="电话号码">
        <button type="button" class="btn btn-secondary" onclick="this.parentElement.remove()">×</button>
      `;
      list.appendChild(div);
    }

    function addEmailItem(type = 'INTERNET', value = '') {
      const list = document.getElementById('email-list');
      const div = document.createElement('div');
      div.className = 'multi-input-item';
      div.innerHTML = `
        <select>
          <option value="INTERNET" ${type === 'INTERNET' ? 'selected' : ''}>邮箱</option>
          <option value="HOME" ${type === 'HOME' ? 'selected' : ''}>家庭</option>
          <option value="WORK" ${type === 'WORK' ? 'selected' : ''}>工作</option>
        </select>
        <input type="email" value="${escapeHtml(value)}" placeholder="邮箱地址">
        <button type="button" class="btn btn-secondary" onclick="this.parentElement.remove()">×</button>
      `;
      list.appendChild(div);
    }

    function closeModal() {
      document.getElementById('contact-modal').classList.remove('show');
    }

    // 显示确认对话框
    function showConfirm(message, callback) {
      document.getElementById('confirm-message').textContent = message;
      confirmCallback = callback;
      document.getElementById('confirm-modal').classList.add('show');
    }

    function closeConfirmModal() {
      document.getElementById('confirm-modal').classList.remove('show');
      confirmCallback = null;
    }

    // 确认对话框事件
    document.getElementById('confirm-modal-close').addEventListener('click', closeConfirmModal);
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirmModal);
    document.getElementById('confirm-ok').addEventListener('click', async () => {
      if (confirmCallback) {
        await confirmCallback();
      }
      closeConfirmModal();
    });

    // 保存联系人
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;

      const tels = [...document.querySelectorAll('#tel-list .multi-input-item')].map(item => ({
        type: item.querySelector('select').value,
        value: item.querySelector('input').value
      })).filter(t => t.value);

      const emails = [...document.querySelectorAll('#email-list .multi-input-item')].map(item => ({
        type: item.querySelector('select').value,
        value: item.querySelector('input').value
      })).filter(e => e.value);

      const data = {
        n_family: form.n_family.value,
        n_given: form.n_given.value,
        fn: form.fn.value,
        tel: tels,
        email: emails,
        org: form.org.value,
        title: form.title.value,
        url: form.url.value,
        bday: form.bday.value,
        note: form.note.value
      };

      try {
        const url = editingId ? `/api/contacts/${editingId}` : '/api/contacts';
        const method = editingId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          credentials: 'same-origin',
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          closeModal();
          loadContacts();
          if (editingId) selectContact(editingId);
        } else {
          const err = await res.json();
          alert(err.error || '保存失败');
        }
      } catch (e) {
        console.error('保存联系人失败', e);
        alert('保存失败');
      }
    });

    async function deleteContact() {
      if (!currentContact) return;

      showConfirm(`确定删除联系人 "${currentContact.fn}" 吗？`, async () => {
        try {
          const res = await fetch(`/api/contacts/${currentContact.id}`, { method: 'DELETE', credentials: 'same-origin' });
          if (res.ok) {
            currentContact = null;
            loadContacts();
            renderContactDetail();
          }
        } catch (e) {
          console.error('删除联系人失败', e);
        }
      });
    }

    function exportContact() {
      if (currentContact) window.location.href = `/api/contacts/export/${currentContact.id}`;
    }

    document.getElementById('export-btn').addEventListener('click', () => {
      window.location.href = '/api/contacts/export';
    });

    document.getElementById('import-btn').addEventListener('click', () => {
      document.getElementById('import-modal').classList.add('show');
    });

    document.getElementById('import-modal-close').addEventListener('click', () => {
      document.getElementById('import-modal').classList.remove('show');
    });

    document.getElementById('import-cancel').addEventListener('click', () => {
      document.getElementById('import-modal').classList.remove('show');
    });

    document.getElementById('import-confirm').addEventListener('click', async () => {
      const vcardContent = document.getElementById('vcard-content').value;
      if (!vcardContent.trim()) {
        alert('请输入 vCard 内容');
        return;
      }

      try {
        const res = await fetch('/api/contacts/import', {
          credentials: 'same-origin',
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vcard: vcardContent })
        });

        if (res.ok) {
          document.getElementById('import-modal').classList.remove('show');
          document.getElementById('vcard-content').value = '';
          loadContacts();
        } else {
          const err = await res.json();
          alert(err.error || '导入失败');
        }
      } catch (e) {
        console.error('导入联系人失败', e);
        alert('导入失败');
      }
    });

    document.getElementById('vcf-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        document.getElementById('vcard-content').value = event.target.result;
      };
      reader.readAsText(file);
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      loadContacts(e.target.value);
    });

    document.getElementById('add-btn').addEventListener('click', openAddModal);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);

    loadContacts();
  </script>
</body>
</html>
