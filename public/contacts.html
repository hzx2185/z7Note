<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系人 - z7Note</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>?v=20250312-FINAL-FIX">
  <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body data-ui-surface="app" data-theme="default" class="workspace-shell contacts-page">
  <div class="header workspace-header workspace-brand-header">
    <div class="workspace-header-group">
      <b class="workspace-title workspace-brand-title">联系人 <span id="count-info" class="workspace-title-meta workspace-brand-meta"></span></b>
    </div>
    <div class="header-actions workspace-header-group workspace-actions workspace-actions-scroll">
      <div class="workspace-top-nav" aria-label="页面切换">
        <a id="nav-home-btn" class="tool-btn workspace-nav-btn" href="/" title="首页">⌂</a>
        <a id="nav-notes-btn" class="tool-btn workspace-nav-btn" href="/app" title="笔记">✎</a>
        <a id="nav-calendar-btn" class="tool-btn workspace-nav-btn" href="/calendar.html" title="日历">◷</a>
        <a id="nav-contacts-btn" class="tool-btn workspace-nav-btn workspace-nav-btn-active" href="/contacts.html" title="通讯录">☏</a>
        <a id="nav-member-btn" class="tool-btn workspace-nav-btn" href="/member" title="会员中心">★</a>
      </div>
      <div data-theme-slot data-theme-mode="compact" data-theme-button-class="tool-btn"></div>
    </div>
  </div>

    <div class="main workspace-main workspace-main-offset workspace-main-stack workspace-main-padded workspace-list-shell">
      <div class="workspace-panel workspace-brand-panel contacts-toolbar-shell">
        <div class="toolbar workspace-panel-row workspace-toolbar contacts-toolbar-primary">
          <div class="search-wrap workspace-search contacts-search-wrap">
            <input type="text" class="search-input workspace-search-input" id="search-input" placeholder="搜索姓名/电话/邮箱/公司/职位/昵称/网址/备注..." oninput="onSearch()">
          </div>
          <div id="pagination" class="workspace-pagination contacts-pagination">
            <select id="page-size" class="page-size-select workspace-page-select" onchange="setPageSize(this.value)">
              <option value="20">20/页</option>
              <option value="50">50/页</option>
              <option value="100">100/页</option>
              <option value="200">200/页</option>
            </select>
            <button class="tool-btn btn-xs page-jump-btn workspace-page-btn" onclick="goToPage(1)" title="第一页">|‹</button>
            <button class="tool-btn btn-xs page-jump-btn workspace-page-btn" onclick="changePage(-1)" title="上一页">‹</button>
            <input id="page-input" class="page-input workspace-page-input" type="number" min="1" inputmode="numeric" onkeydown="onPageInputKeydown(event)" aria-label="页码">
            <button class="tool-btn btn-xs page-jump-btn workspace-page-btn" onclick="jumpToPageInput()" title="跳转">↵</button>
            <button class="tool-btn btn-xs page-jump-btn workspace-page-btn" onclick="changePage(1)" title="下一页">›</button>
            <button class="tool-btn btn-xs page-jump-btn workspace-page-btn" onclick="goToPage(getTotalPages())" title="最后一页">›|</button>
            <span id="page-info" class="workspace-title-meta"></span>
          </div>
        </div>
        <div class="workspace-action-strip contacts-action-strip">
          <button id="contacts-add-btn" class="tool-btn workspace-btn-accent" onclick="openModal()" title="新增联系人" aria-label="新增联系人">+</button>
          <button id="contacts-import-btn" class="tool-btn" onclick="$('import-modal').classList.add('show')" title="导入联系人" aria-label="导入联系人">↓</button>
          <button id="contacts-export-btn" class="tool-btn" onclick="location.href='/api/contacts/export'" title="导出联系人" aria-label="导出联系人">↑</button>
          <button id="contacts-dedupe-btn" class="tool-btn" onclick="smartFindDuplicates()" title="查找重复联系人" aria-label="查找重复联系人">◎</button>
          <button id="contacts-format-btn" class="tool-btn" onclick="formatContacts()" title="格式化联系人" aria-label="格式化联系人">≡</button>
          <button id="contacts-batch-edit-btn" class="tool-btn" onclick="openBatchEditModal()" title="批量修改" aria-label="批量修改">✎</button>
          <button id="contacts-columns-btn" class="tool-btn" onclick="openColumnsModal()" title="显示列设置" aria-label="显示列设置">☷</button>
          <button id="contacts-batch-merge-btn" class="tool-btn workspace-text-accent" onclick="batchMerge()" title="合并选中联系人" aria-label="合并选中联系人">⇄</button>
          <button id="contacts-batch-delete-btn" class="tool-btn workspace-text-danger" onclick="batchDelete()" title="删除选中联系人" aria-label="删除选中联系人">×</button>
          <a class="tool-btn" href="/help" title="帮助" aria-label="帮助">?</a>
        </div>
      </div>
      <div class="table-container workspace-panel workspace-brand-panel workspace-brand-table workspace-table-shell">
        <table class="workspace-table">
          <thead id="contacts-head"></thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>

  <!-- 编辑 -->
  <div class="modal workspace-brand-modal" id="edit-modal">
    <div class="modal-content workspace-modal-card-lg">
      <div class="modal-header"><h3 id="modal-title">联系人</h3><button onclick="closeModal()">×</button></div>
      <form id="contact-form" onsubmit="saveContact(event)" class="modal-body workspace-form">
        <div class="contact-name-row">
          <div class="form-group name-family"><label>姓</label><input name="n_family"></div>
          <div class="form-group name-given"><label>名</label><input name="n_given"></div>
          <div class="form-group name-full"><label>全名*</label><input name="fn" required></div>
        </div>
        <div class="form-group"><label>电话</label><div id="tel-list"></div><button type="button" class="btn btn-xs workspace-dashed-btn" onclick="addItem('tel')">+ 添加号码</button></div>
        <div class="form-group"><label>邮箱</label><div id="email-list"></div><button type="button" class="btn btn-xs workspace-dashed-btn" onclick="addItem('email')">+ 添加邮箱</button></div>
        <div class="workspace-field-split">
          <div class="form-group workspace-field-fill"><label>公司</label><input name="org"></div>
          <div class="form-group workspace-field-fill"><label>职位</label><input name="title"></div>
        </div>
        <div class="form-group"><label>备注</label><textarea name="note" rows="2" class="compact-textarea"></textarea></div>
        <details class="contact-advanced" id="contact-advanced">
          <summary>更多字段</summary>
          <div class="contact-advanced-body">
            <div class="compact-row">
              <div class="form-group"><label>前缀</label><input name="n_prefix"></div>
              <div class="form-group"><label>中间名</label><input name="n_middle"></div>
              <div class="form-group"><label>后缀</label><input name="n_suffix"></div>
            </div>
            <div class="compact-row">
              <div class="form-group"><label>昵称</label><input name="nickname"></div>
              <div class="form-group"><label>生日</label><input name="bday" placeholder="YYYY-MM-DD"></div>
            </div>
            <div class="form-group"><label>网址</label><input name="url" placeholder="https://example.com"></div>
            <div class="form-group">
              <label>地址</label>
              <div id="adr-list"></div>
              <button type="button" class="btn btn-xs workspace-dashed-btn" onclick="addItem('adr')">+ 添加地址</button>
            </div>
            <div class="form-group"><label>照片</label><textarea name="photo" rows="2" class="compact-textarea" placeholder="可填写 URL 或原始数据"></textarea></div>
          </div>
        </details>
        <div class="modal-actions contact-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="button" class="btn btn-secondary hidden" id="history-btn" onclick="showHistory()">历史</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
        <button type="button" class="btn btn-xs workspace-full-btn workspace-text-danger workspace-muted-plain-btn" id="del-contact-btn" onclick="deleteSingle()">删除此联系人</button>
      </form>
    </div>
  </div>

  <!-- 导入 -->
  <div class="modal workspace-brand-modal" id="import-modal">
    <div class="modal-content">
      <div class="modal-header"><h3>导入</h3><button onclick="$('import-modal').classList.remove('show')">×</button></div>
      <div class="modal-body workspace-form">
        <p class="form-hint">粘贴 vCard 文本，或直接选择 `.vcf` 文件。</p>
        <textarea id="vcard-text" placeholder="粘贴 vCard 内容..."></textarea>
        <input id="import-file" type="file" accept=".vcf" onchange="readVcf(this)">
        <button class="btn btn-primary workspace-full-btn" onclick="doImport()">开始导入</button>
      </div>
    </div>
  </div>

  <!-- 查重 -->
  <div class="modal workspace-brand-modal" id="dup-modal">
    <div class="modal-content workspace-modal-card-lg">
      <div class="modal-header"><h3>清理重复</h3><button onclick="$('dup-modal').classList.remove('show')">×</button></div>
      <div class="modal-body">
        <div id="dup-list" class="workspace-scroll-panel"></div>
        <div class="modal-actions workspace-modal-actions-inline">
          <button class="btn btn-secondary" onclick="$('dup-modal').classList.remove('show')">取消</button>
          <button class="btn btn-primary workspace-field-fill" onclick="batchMergeGroups()">合并选中组</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 历史 -->
  <div class="modal workspace-brand-modal" id="history-modal">
    <div class="modal-content workspace-modal-card-lg">
      <div class="modal-header"><h3>修改历史</h3><button onclick="$('history-modal').classList.remove('show')">×</button></div>
      <div class="modal-body">
        <div id="history-list" class="workspace-scroll-panel"></div>
        <div class="modal-actions workspace-modal-actions-inline"><button class="btn btn-secondary workspace-full-btn" onclick="$('history-modal').classList.remove('show')">关闭</button></div>
      </div>
    </div>
  </div>

  <div class="modal workspace-brand-modal" id="confirm-modal">
    <div class="modal-content workspace-modal-card-sm">
      <div class="modal-body workspace-modal-body-tight">
        <p id="confirm-message" class="confirm-message"></p>
        <div class="modal-actions workspace-modal-actions-inline">
          <button type="button" class="btn btn-secondary" id="confirm-cancel">取消</button>
          <button type="button" class="btn btn-primary workspace-danger-fill" id="confirm-ok">确定</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal workspace-brand-modal" id="columns-modal">
    <div class="modal-content workspace-modal-card-md">
      <div class="modal-header"><h3>显示列</h3><button onclick="closeColumnsModal()">×</button></div>
      <div class="modal-body">
        <p class="form-hint workspace-form-hint">勾选需要显示的列，适合检查姓名、姓、名是否规范。</p>
        <div id="column-options" class="column-grid"></div>
        <div class="modal-actions workspace-modal-actions-inline">
          <button class="btn btn-secondary" onclick="resetColumns()">恢复默认</button>
          <button class="btn btn-primary" onclick="closeColumnsModal()">完成</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal workspace-brand-modal" id="batch-edit-modal">
    <div class="modal-content">
      <div class="modal-header"><h3>批量修改</h3><button onclick="closeBatchEditModal()">×</button></div>
      <form id="batch-edit-form" class="modal-body workspace-form" onsubmit="submitBatchEdit(event)">
        <p id="batch-edit-scope" class="form-hint workspace-form-hint"></p>
        <div class="batch-edit-table">
          <div class="batch-edit-table-wrap">
            <div class="batch-edit-head">
              <div>选</div>
              <div>字段</div>
              <div>操作</div>
              <div>原内容</div>
              <div>新内容</div>
              <div></div>
            </div>
            <div id="batch-edit-rows"></div>
          </div>
          <button type="button" class="btn btn-secondary btn-xs workspace-full-btn" onclick="addBatchEditRow()">+ 添加一条规则</button>
        </div>
        <div class="modal-actions workspace-modal-actions-inline">
          <button type="button" class="btn btn-secondary" onclick="closeBatchEditModal()">取消</button>
          <button type="submit" class="btn btn-primary">应用修改</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="/js/contacts-page.js"></script>
  <script src="/js/contacts-entry.js"></script>
</body>
</html>
