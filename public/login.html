<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>z7Note - 登录</title>
    <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
    <link rel="stylesheet" href="/css/site.css?v=20260612-release-109">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            font-family: var(--font-site);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            background:
                radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 16%, transparent), transparent 26%),
                radial-gradient(circle at 100% 18%, color-mix(in srgb, var(--green) 14%, transparent), transparent 24%),
                linear-gradient(180deg, color-mix(in srgb, var(--bg) 90%, #fff 10%) 0%, var(--bg) 100%);
        }
        .login-shell { width:100%; max-width:380px; }
        .card {
            width:100%;
            background:color-mix(in srgb, var(--panel, var(--side)) 92%, transparent);
            border:1px solid var(--border);
            border-radius:24px;
            padding:30px 26px 24px;
            box-shadow:var(--shadow);
            backdrop-filter: blur(14px);
        }
        h2 { text-align:center; margin-bottom:20px; font-size:24px; letter-spacing:-0.03em; }
        .auth-copy { text-align:center; margin:0 0 18px; color:var(--muted); font-size:13px; }
        input {
            width:100%;
            min-height:var(--control-height-md);
            padding:0 var(--control-padding-x-md);
            margin-bottom:12px;
            border:1px solid var(--border);
            border-radius:12px;
            background:color-mix(in srgb, var(--panel, var(--bg)) 90%, transparent);
            color:var(--text);
            outline:none;
            font-size:var(--font-size-md);
        }
        input:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
        button { width:100%; min-height:var(--control-height-md); border:none; border-radius:12px; cursor:pointer; margin-bottom:8px; font-size:var(--font-size-md); font-weight:600; }
        .btn-main { background:var(--green); color:#fff; }
        .btn-alt { background:transparent; color:var(--text); border:1px solid var(--border); }
        .error { color:var(--red); font-size:12px; margin-bottom:10px; display:none; }
        .theme-btn {
            position:fixed;
            top:14px;
            right:14px;
            min-width:52px;
            min-height:40px;
            padding:0 14px;
            border:1px solid var(--border);
            border-radius:999px;
            background:color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            color:var(--text);
            cursor:pointer;
            box-shadow:var(--shadow-sm);
        }
        #toast {
            position:fixed;
            bottom:18px;
            left:50%;
            transform:translateX(-50%);
            background:var(--text);
            color:var(--panel-strong, var(--bg));
            padding:10px 20px;
            border-radius:999px;
            display:none;
            box-shadow:var(--shadow-md);
        }
        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; padding:20px; }
        #modal > div {
            background:var(--panel-strong, var(--bg));
            padding:24px;
            border-radius:20px;
            max-width:320px;
            width:100%;
            text-align:center;
            border:1px solid var(--border);
            box-shadow:var(--shadow-lg);
        }
    </style>
</head>
<body data-ui-surface="site" data-theme="default">
    <div data-theme-slot data-theme-mode="compact" data-theme-button-class="theme-btn" data-theme-button-id="themeBtn"></div>
    <div id="toast"></div>
    <div id="modal"><div><p id="modalMsg"></p><button class="btn-main" onclick="document.getElementById('modal').style.display='none'" style="margin-top:16px;width:auto;padding:8px 24px;">确定</button></div></div>

    <div class="login-shell">
    <div class="card">
        <form id="authForm" onsubmit="handleAuth(event)">
            <h2 id="title">用户登录</h2>
            <p class="auth-copy">进入你的笔记、日历、联系人统一工作区</p>
            <div id="authErr" class="error"></div>
            <input type="text" id="username" placeholder="用户名" autocomplete="username" required>
            <input type="password" id="password" placeholder="密码" autocomplete="current-password" required>
            <input type="password" id="adminToken" placeholder="管理员初始化令牌（仅管理员注册需要）" autocomplete="off" style="display:none">
            <button class="btn-main" id="submitBtn">立即登录</button>
            <button type="button" class="btn-alt" onclick="toggleMode()">没有账号？点击注册</button>
            <button type="button" class="btn-alt" onclick="document.getElementById('authForm').style.display='none';document.getElementById('resetForm').style.display='block'">忘记密码？</button>
        </form>

        <form id="resetForm" style="display:none" onsubmit="doReset(event)">
            <h2>找回密码</h2>
            <p class="auth-copy">通过邮箱验证码重置登录密码</p>
            <input type="email" id="resetEmail" placeholder="邮箱" required>
            <button type="button" class="btn-alt" id="codeBtn" onclick="sendCode()">获取验证码</button>
            <input type="text" id="resetToken" placeholder="6位验证码" maxlength="6" required>
            <input type="password" id="newPass" placeholder="新密码" required>
            <button class="btn-main">重置并登录</button>
            <button type="button" class="btn-alt" onclick="document.getElementById('resetForm').style.display='none';document.getElementById('authForm').style.display='block'">返回登录</button>
        </form>

        <form id="tfaForm" style="display:none" onsubmit="handleTFA(event)">
            <h2>两步验证</h2>
            <p class="auth-copy">输入动态验证码或备用代码完成验证</p>
            <div id="tfaErr" class="error"></div>
            <input type="text" id="tfaToken" placeholder="6位验证码或8位备用代码" maxlength="8" required>
            <button class="btn-main" id="tfaBtn">验证</button>
        </form>
    </div>
    </div>

    <script src="/js/login-page.js"></script>
</body>
</html>
