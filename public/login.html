<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        /**
         * 极致错误拦截器 - 消除浏览器扩展及已知干扰报错
         */
        (function() {
            const IGNORE_PATTERNS = [
                'bootstrap-autofill', 'AutofillOverlayContentService', 'setQualifiedLoginFillType', 'isIgnoredField',
                'extension://', 'non-passive event listener', 'purify.min.js.map', 'includes', 'TypeError'
            ];

            const isRedundantError = (msg, stack, file) => {
                const searchStr = `${msg} ${stack} ${file}`;
                return IGNORE_PATTERNS.some(p => searchStr.includes(p)) || !msg || msg.includes('Cannot read properties of null');
            };

            // 拦截 window 错误
            window.addEventListener('error', (e) => {
                if (isRedundantError(e.message, e.error?.stack, e.filename)) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                    return false;
                }
            }, true);

            // 拦截 Promise 拒绝
            window.addEventListener('unhandledrejection', (e) => {
                const stack = e.reason?.stack || '';
                const msg = e.reason?.message || String(e.reason);
                if (isRedundantError(msg, stack, '')) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                    return false;
                }
            }, true);

            // 抑制 console 警告和错误
            const originalWarn = console.warn;
            const originalError = console.error;
            
            console.warn = (...args) => {
                if (typeof args[0] === 'string' && IGNORE_PATTERNS.some(p => args[0].includes(p))) return;
                originalWarn.apply(console, args);
            };

            console.error = (...args) => {
                if (typeof args[0] === 'string' && IGNORE_PATTERNS.some(p => args[0].includes(p))) return;
                originalError.apply(console, args);
            };
        })();
    </script>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="z7Note">
    <title>z7Note - 用户登录</title>
    <!-- HTML 文件不缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/css/app.css?v=20250302-v4">
</head>
<body class="auth-layout">
    <div id="toast"></div>

    <!-- 自定义模态框 -->
    <div id="custom-modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>提示</h3>
                <button onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <p id="modal-message"></p>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal()">确定</button>
            </div>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="theme-toggle-btn">🌙</button>

    <div class="auth-card">
        <form id="auth-form" onsubmit="handleAuth(event)">
            <h2 id="title">用户登录</h2>
            <div id="auth-error" class="error-msg"></div>
            <input type="text" id="username" name="username" placeholder="用户名" autocomplete="username" required>
            <input type="password" id="password" name="password" placeholder="密码" autocomplete="current-password" required>
            <button id="submit-btn" type="submit">立即登录</button>
            <button type="button" class="alt-btn" id="mode-toggle" onclick="toggleMode()">没有账号？点击注册</button>
            <button type="button" class="alt-btn" onclick="toggleForgot(true)">忘记密码？</button>
        </form>

        <form id="forgot-password-area" style="display:none;" onsubmit="doReset(event)">
            <h2>找回密码</h2>
            <input type="email" id="reset-email" name="email" placeholder="输入绑定的邮箱" autocomplete="email" required>
            <button type="button" id="send-code-btn" class="code-btn" onclick="sendCode()">获取验证码</button>
            <hr>
            <input type="text" id="reset-token" name="reset-token" placeholder="6位验证码" autocomplete="one-time-code" inputmode="numeric" maxlength="6" required>
            <input type="password" id="reset-new-pass" name="new-password" placeholder="新密码" autocomplete="new-password" required>
            <button type="submit">重置并登录</button>
            <button type="button" class="alt-btn" onclick="toggleForgot(false)">返回登录</button>
        </form>

        <form id="tfa-form" style="display:none;" onsubmit="handleTFA(event)">
            <h2>两步验证</h2>
            <div id="tfa-error" class="error-msg"></div>
            <input type="text" id="tfa-token" name="tfa-token" placeholder="6位验证码或8位备用代码" autocomplete="one-time-code" required inputmode="text" maxlength="8">
            <button id="tfa-submit-btn" type="submit">验证</button>
        </form>
    </div>

    <script>
        let isLoginMode = true;
        let tempToken = null; // 用于存储2FA临时令牌

        // 主题切换功能 - 简化并使用 app.css 中的定义
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            setTheme(theme);
        }

        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                const themeBtn = document.getElementById('theme-toggle-btn');
                if (themeBtn) themeBtn.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark-mode');
                const themeBtn = document.getElementById('theme-toggle-btn');
                if (themeBtn) themeBtn.textContent = '🌙';
            }
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark-mode');
            setTheme(isDark ? 'light' : 'dark');
        }

        // 页面加载时初始化主题
        initTheme();

        // UI 辅助函数
        function showModal(msg) {
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('custom-modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('custom-modal-overlay').style.display = 'none';
        }

        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, duration);
        }
        
        function showError(id, msg) {
            const errEl = document.getElementById(id);
            errEl.innerText = msg;
            errEl.style.display = 'block';
        }

        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('title').innerText = isLoginMode ? '用户登录' : '创建新账号';
            document.getElementById('submit-btn').innerText = isLoginMode ? '立即登录' : '注册并登录';
            document.getElementById('mode-toggle').innerText = isLoginMode ? '没有账号？点击注册' : '已有账号？点击登录';
        }

        function toggleForgot(show) {
            document.getElementById('auth-form').style.display = show ? 'none' : 'block';
            document.getElementById('forgot-password-area').style.display = show ? 'block' : 'none';
        }
        
        function showTFAForm() {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('forgot-password-area').style.display = 'none';
            document.getElementById('tfa-form').style.display = 'block';
        }

        // 用户名合法性校验逻辑
        function validateUsernameInput(user) {
            if (user.includes('@')) return "用户名不能包含@符号（不能是邮箱）";
            const regex = /^[a-zA-Z0-9_]+$/;
            if (!regex.test(user)) return "用户名只能包含字母、数字或下划线";
            if (user.length < 3 || user.length > 15) return "用户名长度需在 3-15 位之间";
            return null;
        }

        async function finalizeLogin(user, successText) {
            try {
                const sessionCheck = await fetch('/api/user-info', {
                    credentials: 'same-origin',
                    cache: 'no-store'
                });

                if (!sessionCheck.ok) {
                    throw new Error(`session-check-${sessionCheck.status}`);
                }

                localStorage.setItem('z7note_username', user);
                showToast(successText);
                setTimeout(() => { window.location.href = '/'; }, 800);
            } catch (err) {
                console.error('[Login] Session not established:', err);
                showError('auth-error', '登录成功，但浏览器未保存会话，请检查站点地址、HTTPS 与 COOKIE_SECURE 配置');
                const btn = document.getElementById('submit-btn');
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = isLoginMode ? '立即登录' : '注册并登录';
                }
                const tfaBtn = document.getElementById('tfa-submit-btn');
                if (tfaBtn) {
                    tfaBtn.disabled = false;
                    tfaBtn.innerText = '验证';
                }
            }
        }

        // 处理登录与注册请求
        async function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const url = isLoginMode ? '/api/login' : '/api/register';
            const btn = document.getElementById('submit-btn');

            if (!isLoginMode) {
                const checkError = validateUsernameInput(user);
                if (checkError) {
                    showError('auth-error', checkError);
                    return;
                }
                if (pass.length < 6) {
                    showError('auth-error', "密码长度至少为 6 位");
                    return;
                }
            }

            btn.disabled = true;
            btn.innerText = "正在验证...";
            hideError('auth-error');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                console.log('[Login] Response received, status:', response.status);
                const data = await response.json();
                console.log('[Login] Response data:', data);
                
                if (response.ok) {
                    if (data.status === 'tfa_required') {
                        console.log('[Login] 2FA required, tempToken received');
                        tempToken = data.tempToken;
                        showTFAForm();
                    } else { // 登录成功或注册成功
                        await finalizeLogin(user, isLoginMode ? "登录成功" : "注册成功");
                    }
                } else {
                    showError('auth-error', data.error || '操作失败');
                    btn.disabled = false;
                    btn.innerText = isLoginMode ? '立即登录' : '注册并登录';
                }
            } catch (err) {
                showError('auth-error', '连接服务器失败，请稍后再试');
                btn.disabled = false;
                btn.innerText = isLoginMode ? '立即登录' : '注册并登录';
            }
        }
        
        // 处理2FA验证
        async function handleTFA(e) {
            e.preventDefault();
            const tfaToken = document.getElementById('tfa-token').value.trim();
            const btn = document.getElementById('tfa-submit-btn');

            console.log('[Login] handleTFA called');
            console.log('[Login] tempToken length:', tempToken?.length || 0);
            console.log('[Login] tfaToken:', tfaToken);

            if (!tfaToken || (tfaToken.length !== 6 && tfaToken.length !== 8)) {
                showError('tfa-error', '请输入6位验证码或8位备用代码');
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在验证...";
            hideError('tfa-error');

            try {
                console.log('[Login] Sending verify-tfa request...');
                const response = await fetch('/api/verify-tfa', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tempToken, tfaToken })
                });

                console.log('[Login] Response status:', response.status);
                const data = await response.json();
                console.log('[Login] Response data:', data);
                
                if (response.ok && data.status === 'ok') {
                    await finalizeLogin(document.getElementById('username').value.trim(), "验证成功，正在登录...");
                } else {
                    const errorMsg = data.error || '验证失败';
                    console.error('[Login] Error:', errorMsg);
                    showError('tfa-error', errorMsg);
                    btn.disabled = false;
                    btn.innerText = '验证';
                }
            } catch (err) {
                console.error('[Login] Exception:', err);
                showError('tfa-error', '连接服务器失败，请稍后再试');
                btn.disabled = false;
                btn.innerText = '验证';
            }
        }

        // 发送找回密码验证码
        async function sendCode() {
            const email = document.getElementById('reset-email').value;
            if(!email || !email.includes('@')) return showToast("请输入正确的邮箱");
            
            const btn = document.getElementById('send-code-btn');
            btn.disabled = true;
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                if(res.ok) {
                    showModal("验证码已发送至您的邮箱，请注意查收");
                    let count = 60;
                    const timer = setInterval(() => {
                        btn.innerText = `重新发送(${--count})`;
                        if(count <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.innerText = "获取验证码";
                        }
                    }, 1000);
                } else {
                    const data = await res.json();
                    showToast(data.error || "发送失败");
                    btn.disabled = false;
                }
            } catch(e) { 
                showToast("请求失败"); 
                btn.disabled = false; 
            }
        }

        // 执行重置密码
        async function doReset(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const token = document.getElementById('reset-token').value;
            const newPass = document.getElementById('reset-new-pass').value;
            
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, token, newPass })
                });
                if(res.ok) {
                    showModal("密码修改成功，请重新登录");
                    toggleForgot(false);
                } else {
                    const data = await res.json();
                    showToast(data.error || "重置失败");
                }
            } catch(e) { showToast("网络错误"); }
        }
    </script>
</body>
</html>
