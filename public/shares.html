<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z7Note - 分享中心</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: auto !important;
            min-height: 100vh;
            overflow: auto !important;
            width: 100%;
        }

        /* 强制重置 header 样式 */
        body > .header {
            position: static !important;
            top: auto !important;
            left: auto !important;
            right: auto !important;
            width: 100% !important;
            height: auto !important;
            max-width: none !important;
            padding: 16px 20px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid var(--border);
            z-index: auto !important;
        }

        /* 强制重置 container 样式 */
        body > .container {
            position: static !important;
            overflow: visible !important;
            padding-top: 20px !important;
            padding-bottom: 20px !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
            width: 100% !important;
            max-width: 1200px !important;
            margin: 0 auto !important;
            display: block !important;
        }

        :root {
            --bg: #ffffff;
            --side: #f6f8fa;
            --text: #24292f;
            --border: #d0d7de;
            --accent: #0969da;
            --red: #cf222e;
            --gray: #8b949e;
            --green: #2da44e;
        }
        body.dark-mode {
            --bg: #0d1117;
            --side: #161b22;
            --text: #c9d1d9;
            --border: #30363d;
            --accent: #58a6ff;
            --gray: #8b949e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .header { background: var(--side); }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header a { color: var(--accent); text-decoration: none; font-size: 14px; }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }
        .toolbar button {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .share-list { display: flex; flex-direction: column; }
        .share-header {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 8px 0;
            font-size: 12px;
            color: var(--gray);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            background: var(--side);
            justify-content: center;
        }
        .share-header span {
            flex-shrink: 0;
            text-align: center;
        }
        .share-header span:nth-child(1) { padding: 8px 10px; min-width: 60px; }
        .share-header span:nth-child(2) { padding: 8px 10px; min-width: 60px; }
        .share-header span:nth-child(3) { padding: 8px 10px; flex: 1; }
        .share-header span:nth-child(4) { padding: 8px 10px; min-width: 70px; }
        .share-header span:nth-child(5) { padding: 8px 10px; min-width: 80px; }
        .share-header span:nth-child(6) { padding: 8px 10px; width: 50px; }

        .share-item {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .share-item:hover {
            background: rgba(9, 105, 218, 0.05);
        }
        .share-item > * {
            flex-shrink: 0;
            text-align: center;
        }
        .share-item > span:nth-child(1) { padding: 8px 10px; min-width: 60px; }
        .share-item > span:nth-child(2) { padding: 8px 10px; min-width: 60px; }
        .share-item > .share-title { padding: 8px 10px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .share-item > span:nth-child(4) { padding: 8px 10px; min-width: 70px; }
        .share-item > span:nth-child(5) { padding: 8px 10px; min-width: 80px; }
        .share-item > button { padding: 8px 10px; width: 50px; }

        .share-title {
            color: var(--text);
            text-decoration: none;
        }
        .share-title:hover { text-decoration: underline; color: var(--accent); }
        .share-type {
            color: var(--gray);
            font-size: 12px;
        }
        .expiry-soon { color: var(--red); }
        .copy-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 16px;
            cursor: pointer;
            padding: 0;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .copy-btn:hover {
            opacity: 1;
            color: var(--accent);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            margin-top: 16px;
            border-top: 1px solid var(--border);
        }
        .pagination button {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            font-size: 14px;
            color: var(--gray);
        }

        .empty, .loading, .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
            font-size: 14px;
        }
        .error { color: var(--red); }

        /* 用户页面的用户信息样式 */
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }
        .user-info h2 { font-size: 18px; margin-bottom: 4px; }
        .user-info p { font-size: 13px; color: var(--gray); }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-card {
            background: var(--side);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .category-card:hover { border-color: var(--accent); }
        .category-card h3 {
            font-size: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-card h3 span { color: var(--accent); font-size: 13px; }
        .category-card p { font-size: 13px; color: var(--gray); }
        .note-list { display: flex; flex-direction: column; gap: 8px; }
        .note-item {
            background: var(--side);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note-item a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
        .note-item a:hover { text-decoration: underline; }
        .note-item .date { font-size: 12px; color: var(--gray); }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--text);
        }
        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 16px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .share-header span {
                padding: 8px 6px !important;
                min-width: auto !important;
            }
            .share-item > * {
                padding: 8px 6px !important;
                min-width: auto !important;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="page-title">分享中心</h1>
        <a href="/">← 返回首页</a>
    </div>

    <div class="container" id="main-container">
        <!-- 动态内容区域 -->
    </div>

    <script>
        // 初始化主题
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.body.classList.add('dark-mode');
        }

        const params = new URLSearchParams(location.search);
        const userParam = params.get('user');
        const categoryParam = params.get('category');

        // 全局变量存储原始数据，避免重复请求
        let allShares = [];
        let currentPage = 1;
        let pageSize = 50;

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(parseInt(timestamp));
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
        }

        // 格式化有效期
        function formatExpiry(expiresAt) {
            if (!expiresAt || expiresAt === '0') return '永久';
            const exp = parseInt(expiresAt);
            const now = Date.now();
            const diff = exp - now;
            if (diff <= 0) return '过期';
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 0) return `${days}天`;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            return `${hours}时`;
        }

        // 获取分享类型标签
        function getTypeLabel(type) {
            const labels = { category: '分类', note: '笔记', file: '附件' };
            return labels[type] || type;
        }

        // 渲染分享项（单行显示，包含所有信息）
        function renderShareItem(s) {
            const shareUrl = `${location.protocol}//${location.host}/s/${s.token}`;
            const expiryClass = s.expiresAt && parseInt(s.expiresAt) > 0 && parseInt(s.expiresAt) - Date.now() < 86400000 ? 'expiry-soon' : '';

            return `
                <div class="share-item">
                    <span class="share-type ${s.type}">${getTypeLabel(s.type)}</span>
                    <span>${s.category ? escapeHtml(s.category) : '-'}</span>
                    <a href="${shareUrl}" class="share-title" target="_blank" title="${escapeHtml(s.title || '无标题')}">${escapeHtml(s.title || '无标题')}</a>
                    <span class="${expiryClass}">${formatExpiry(s.expiresAt)}</span>
                    <span>${formatTime(s.createdAt)}</span>
                    <button class="copy-btn" onclick="copyShareLink('${shareUrl}')">🔗</button>
                </div>
            `;
        }

        // 复制分享链接
        function copyShareLink(url) {
            // 尝试多种复制方法
            let copied = false;

            // 方法1: Clipboard API (现代浏览器)
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    copied = true;
                }).catch(err => {
                    console.warn('Clipboard API 失败:', err);
                });
            }

            // 方法2: document.execCommand (传统方法，降级方案)
            if (!copied) {
                try {
                    const textArea = document.createElement('textarea');
                    textArea.value = url;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-9999px';
                    textArea.style.top = '0';
                    document.body.appendChild(textArea);
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (successful) {
                        copied = true;
                    }
                } catch (err) {
                    console.warn('execCommand 复制失败:', err);
                }
            }

            // 更新按钮状态
            if (copied) {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.style.borderColor = 'var(--green)';
                btn.style.color = 'var(--green)';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 1500);
            } else {
                // 如果都失败，显示提示框让用户手动复制
                prompt('按 Ctrl+C 复制链接:', url);
            }
        }

        // 加载总分享列表
        async function loadAllShares() {
            const container = document.getElementById('main-container');
            const searchInput = document.getElementById('search-input');
            const searchValue = searchInput ? searchInput.value : '';

            container.innerHTML = `
                <div class="toolbar">
                    <input type="text" id="search-input" placeholder="搜索分享标题、用户名或分类..." value="${escapeHtml(searchValue)}">
                    <button onclick="loadAllShares()">刷新</button>
                </div>
                <div class="loading">加载中...</div>
            `;

            try {
                const res = await fetch('/api/share/public-list');
                if (!res.ok) throw new Error('加载失败');
                const shares = await res.json();

                // 保存到全局变量
                allShares = shares;

                if (shares.length === 0) {
                    const listContainer = document.querySelector('.share-list');
                    if (listContainer) {
                        listContainer.innerHTML = '<div class="empty">暂无公开分享</div>';
                    } else {
                        container.innerHTML += '<div class="share-list"><div class="empty">暂无公开分享</div></div>';
                    }
                    return;
                }

                // 按用户分组
                const byUser = {};
                shares.forEach(s => {
                    if (!byUser[s.owner]) byUser[s.owner] = [];
                    byUser[s.owner].push(s);
                });

                renderAllShares(shares, byUser);

                // 添加搜索事件
                const input = document.getElementById('search-input');
                input.addEventListener('input', handleSearch);
            } catch (e) {
                const listContainer = document.querySelector('.share-list');
                if (listContainer) {
                    listContainer.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
                } else {
                    container.innerHTML += '<div class="share-list"><div class="error">加载失败，请刷新重试</div></div>';
                }
            }
        }

        // 渲染总分享列表（统一列表，包含类型列，支持分页）
        function renderAllShares(shares, byUser) {
            const container = document.getElementById('main-container');
            const searchInput = document.getElementById('search-input');
            const searchValue = searchInput ? searchInput.value : '';

            // 按创建时间降序排序，最新在前面
            const sortedShares = [...shares].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

            // 计算总数和分页
            const totalShares = sortedShares.length;
            const totalPages = Math.ceil(totalShares / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageShares = sortedShares.slice(startIndex, endIndex);

            // 检查是否已存在 share-list
            let listContainer = document.querySelector('.share-list');

            if (!listContainer) {
                // 首次渲染，创建完整HTML
                let html = `
                    <div class="toolbar">
                        <input type="text" id="search-input" placeholder="搜索分享标题、用户名或分类..." value="${escapeHtml(searchValue)}">
                        <button onclick="loadAllShares()">刷新</button>
                    </div>
                    <div class="share-list">
                        <div class="share-header">
                            <span>类型</span>
                            <span>目录</span>
                            <span>标题</span>
                            <span>有效期</span>
                            <span>日期</span>
                            <span></span>
                        </div>
                `;

                if (pageShares.length === 0) {
                    html += '<div class="empty">暂无公开分享</div>';
                } else {
                    pageShares.forEach(s => {
                        html += renderShareItem(s);
                    });
                }

                // 添加分页控件
                if (totalPages > 1) {
                    html += '<div class="pagination">';
                    html += '<button onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
                    html += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
                    html += '<button onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
                    html += '</div>';
                }

                html += '</div>';
                container.innerHTML = html;
            } else {
                // 已存在，只更新列表内容
                let html = '<div class="share-header"><span>类型</span><span>目录</span><span>标题</span><span>有效期</span><span>日期</span><span></span></div>';

                if (pageShares.length === 0) {
                    html += '<div class="empty">暂无公开分享</div>';
                } else {
                    pageShares.forEach(s => {
                        html += renderShareItem(s);
                    });
                }

                // 添加分页控件
                if (totalPages > 1) {
                    html += '<div class="pagination">';
                    html += '<button onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
                    html += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
                    html += '<button onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
                    html += '</div>';
                }

                listContainer.innerHTML = html;
            }
        }

        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(allShares.length / pageSize);
            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderAllShares(allShares, {});

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 搜索处理函数 - 只更新列表，不重新渲染toolbar
        function handleSearch(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const listContainer = document.querySelector('.share-list');

            if (!listContainer) return;

            // 按时间排序
            const sortedShares = [...allShares].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

            // 计算总数和分页
            const totalShares = sortedShares.length;
            const totalPages = Math.ceil(totalShares / pageSize);
            
            // 搜索时重置到第一页
            if (keyword && currentPage !== 1) {
                currentPage = 1;
            }

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageShares = sortedShares.slice(startIndex, endIndex);

            let html = '<div class="share-header"><span>类型</span><span>目录</span><span>标题</span><span>有效期</span><span>日期</span><span></span></div>';

            if (!keyword) {
                if (pageShares.length === 0) {
                    html += '<div class="empty">暂无公开分享</div>';
                } else {
                    pageShares.forEach(s => {
                        html += renderShareItem(s);
                    });
                }
            } else {
                // 过滤并显示
                const filtered = sortedShares.filter(s =>
                    (s.title || '').toLowerCase().includes(keyword) ||
                    (s.owner || '').toLowerCase().includes(keyword) ||
                    (s.category || '').toLowerCase().includes(keyword)
                );

                const filteredTotalPages = Math.ceil(filtered.length / pageSize);
                const filteredStartIndex = (currentPage - 1) * pageSize;
                const filteredEndIndex = filteredStartIndex + pageSize;
                const filteredPageShares = filtered.slice(filteredStartIndex, filteredEndIndex);

                if (filteredPageShares.length === 0) {
                    html += '<div class="empty">没有找到匹配的分享</div>';
                } else {
                    filteredPageShares.forEach(s => {
                        html += renderShareItem(s);
                    });
                }

                // 更新分页信息
                if (filteredTotalPages > 1) {
                    html += '<div class="pagination">';
                    html += '<button onclick="changePage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
                    html += '<span>第 ' + currentPage + ' / ' + filteredTotalPages + ' 页</span>';
                    html += '<button onclick="changePage(' + (currentPage + 1) + ')" ' + (currentPage === filteredTotalPages ? 'disabled' : '') + '>下一页</button>';
                    html += '</div>';
                }
            }

            listContainer.innerHTML = html;
        }

        // 渲染分享列表（已废弃，整合到 handleSearch 中）
        function renderShareList(shares) {
            // 此函数已整合到 handleSearch 中，保留兼容
        }

        // 加载用户分享页面
        async function loadUserShares(user) {
            document.getElementById('page-title').textContent = `${user} 的分享`;
            const container = document.getElementById('main-container');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const res = await fetch('/api/share/public-list');
                if (!res.ok) throw new Error('加载失败');
                const allShares = await res.json();
                let userShares = allShares.filter(s => s.owner === user);

                if (userShares.length === 0) {
                    container.innerHTML = '<div class="empty">该用户暂无分享</div>';
                    return;
                }

                // 按时间排序
                userShares.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                // 分类整理（用于顶部统计）
                const categories = {};
                const noteCount = userShares.filter(s => s.type === 'note').length;
                const fileCount = userShares.filter(s => s.type === 'file').length;

                userShares.forEach(s => {
                    if (s.type === 'category') {
                        categories[s.category] = { ...s, count: 0 };
                    } else if (s.type === 'note') {
                        const cat = s.category || '未分类';
                        if (!categories[cat]) categories[cat] = { name: cat, count: 0 };
                        categories[cat].count++;
                    }
                });

                let html = `<a href="shares.html" class="back-btn">← 返回分享中心</a>`;

                html += `
                    <div class="user-header">
                        <div class="user-avatar">${user.charAt(0).toUpperCase()}</div>
                        <div class="user-info">
                            <h2>${user}</h2>
                            <p>${Object.keys(categories).length} 个分类 · ${noteCount} 篇笔记 · ${fileCount} 个附件</p>
                        </div>
                    </div>

                    <div class="toolbar">
                        <input type="text" id="user-search-input" placeholder="搜索此用户的分享...">
                    </div>

                    <div class="share-list" id="user-share-list">
                        <div class="share-header">
                            <span>类型</span>
                            <span>目录</span>
                            <span>标题</span>
                            <span>有效期</span>
                            <span>日期</span>
                            <span></span>
                        </div>
                `;

                userShares.forEach(s => {
                    html += renderShareItem(s);
                });

                html += '</div>';

                container.innerHTML = html;

                // 添加搜索事件
                document.getElementById('user-search-input').addEventListener('input', (e) => {
                    const keyword = e.target.value.toLowerCase().trim();
                    const listDiv = document.getElementById('user-share-list');
                    const headerHtml = '<div class="share-header"><span>类型</span><span>目录</span><span>标题</span><span>有效期</span><span>日期</span><span></span></div>';

                    if (!keyword) {
                        // 显示所有
                        listDiv.innerHTML = headerHtml + userShares.map(s => renderShareItem(s)).join('');
                    } else {
                        // 过滤
                        const filtered = userShares.filter(s =>
                            (s.title || '').toLowerCase().includes(keyword) ||
                            (s.category || '').toLowerCase().includes(keyword)
                        );
                        listDiv.innerHTML = headerHtml + filtered.map(s => renderShareItem(s)).join('');
                    }
                });
            } catch (e) {
                container.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        // 加载分类笔记列表
        async function loadCategoryNotes(user, category) {
            document.getElementById('page-title').textContent = `${category}`;
            const container = document.getElementById('main-container');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                // 先查找是否有该分类的分享token
                const listRes = await fetch('/api/share/public-list');
                if (!listRes.ok) throw new Error('加载失败');
                const allShares = await listRes.json();

                // 查找该分类的分享token
                const categoryShare = allShares.find(s =>
                    s.owner === user && s.type === 'category' && s.target === category
                );
                const categoryToken = categoryShare ? categoryShare.token : null;

                // 获取该分类下的笔记
                const notesRes = await fetch(`/api/notes?user=${encodeURIComponent(user)}&category=${encodeURIComponent(category)}`);
                let notes = [];

                if (notesRes.ok) {
                    notes = await notesRes.json();
                }

                let html = `<a href="?user=${encodeURIComponent(user)}" class="back-btn">← 返回 ${user} 的分享</a>`;

                html += '<h3 class="section-title">📁 ' + escapeHtml(category) + '</h3>';

                if (notes.length === 0) {
                    html += '<div class="empty">该分类下暂无笔记</div>';
                } else {
                    html += '<div class="note-list">';
                    notes.forEach(note => {
                        const displayTitle = (note.title || '无标题').split('/').pop() || note.title;
                        // 查找笔记分享
                        const noteShare = allShares.find(s =>
                            s.owner === user && s.type === 'note' && s.target === note.id.toString()
                        );
                        
                        // 如果笔记没有单独分享，但分类有分享，使用分类token
                        const shareToken = noteShare ? noteShare.token : (categoryToken ? `${categoryToken}?note=${note.id}` : null);
                        const shareLink = shareToken ? `/share.html?token=${encodeURIComponent(shareToken)}` : `javascript:void(0)`;
                        
                        html += `
                            <div class="note-item">
                                <a href="${shareLink}" target="_blank" ${!shareToken ? 'style="color:var(--gray);"' : ''}>${escapeHtml(displayTitle)}</a>
                                <span class="date">${formatTime(note.updatedAt || note.createdAt)}${!shareToken ? ' · 未分享' : ''}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 路由
        if (categoryParam && userParam) {
            loadCategoryNotes(userParam, categoryParam);
        } else if (userParam) {
            loadUserShares(userParam);
        } else {
            loadAllShares();
        }
    </script>
</body>
</html>
