<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z7Note - 分享中心</title>
    <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
    <link rel="stylesheet" href="/css/app.css?v=20260421-shares-unify">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: auto !important;
            min-height: 100vh;
            overflow: auto !important;
            width: 100%;
        }

        body > .header {
            position: static !important;
            top: auto !important;
            left: auto !important;
            right: auto !important;
            width: 100% !important;
            height: auto !important;
            max-width: none !important;
            padding: 14px 20px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            border-bottom: 1px solid var(--border);
            z-index: auto !important;
            background: color-mix(in srgb, var(--panel, var(--bg)) 88%, transparent);
            backdrop-filter: blur(14px);
        }

        body > .container {
            position: static !important;
            overflow: visible !important;
            padding-top: 20px !important;
            padding-bottom: 20px !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
            width: 100% !important;
            max-width: 1200px !important;
            margin: 0 auto !important;
            display: block !important;
        }

        body {
            font-family: var(--font-site);
            background:
                radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 12%, transparent), transparent 26%),
                linear-gradient(180deg, color-mix(in srgb, var(--bg) 90%, #fff 10%) 0%, var(--bg) 100%);
            color: var(--text);
        }
        .header-actions {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .header { background: transparent; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header a { color: var(--accent); text-decoration: none; font-size: 14px; }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar input {
            flex: 1;
            min-width: 200px;
            min-height: var(--control-height-md);
            padding: 0 var(--control-padding-x-md);
        }
        .toolbar button {
            min-height: var(--control-height-md);
            padding: 0 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }
        .share-list {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            background: color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            box-shadow: var(--shadow);
        }
        .share-header {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 10px 0;
            font-size: 12px;
            color: var(--muted, var(--gray));
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--panel-strong, var(--bg)) 90%, transparent);
            justify-content: center;
        }
        .share-header span {
            flex-shrink: 0;
            text-align: center;
        }
        .share-header span:nth-child(1) { padding: 8px 10px; min-width: 60px; }
        .share-header span:nth-child(2) { padding: 8px 10px; min-width: 60px; }
        .share-header span:nth-child(3) { padding: 8px 10px; flex: 1; }
        .share-header span:nth-child(4) { padding: 8px 10px; min-width: 70px; }
        .share-header span:nth-child(5) { padding: 8px 10px; min-width: 80px; }
        .share-header span:nth-child(6) { padding: 8px 10px; width: 50px; }

        .share-item {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .share-item:hover {
            background: rgba(9, 105, 218, 0.05);
        }
        .share-item > * {
            flex-shrink: 0;
            text-align: center;
        }
        .share-item > span:nth-child(1) { padding: 8px 10px; min-width: 60px; }
        .share-item > span:nth-child(2) { padding: 8px 10px; min-width: 60px; }
        .share-item > .share-title { padding: 8px 10px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .share-item > span:nth-child(4) { padding: 8px 10px; min-width: 70px; }
        .share-item > span:nth-child(5) { padding: 8px 10px; min-width: 80px; }
        .share-item > button { padding: 8px 10px; width: 50px; }

        .share-title {
            color: var(--text);
            text-decoration: none;
        }
        .share-title:hover { text-decoration: underline; color: var(--accent); }
        .share-type {
            color: var(--gray);
            font-size: 12px;
        }
        .expiry-soon { color: var(--red); }
        .copy-btn {
            background: none;
            border: none;
            color: var(--muted, var(--gray));
            font-size: 16px;
            cursor: pointer;
            padding: 0;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .copy-btn:hover {
            opacity: 1;
            color: var(--accent);
        }

        .copy-btn.is-copied {
            opacity: 1;
            color: var(--green);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            margin-top: 16px;
        }
        .pagination button {
            min-height: var(--control-height-md);
            padding: 0 16px;
            background: color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            font-size: 14px;
            color: var(--gray);
        }

        .empty, .loading, .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
            font-size: 14px;
        }
        .error { color: var(--red); }

        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }
        .user-info h2 { font-size: 18px; margin-bottom: 4px; }
        .user-info p { font-size: 13px; color: var(--gray); }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-card {
            background: color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .category-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
        .category-card h3 {
            font-size: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-card h3 span { color: var(--accent); font-size: 13px; }
        .category-card p { font-size: 13px; color: var(--gray); }
        .note-list { display: flex; flex-direction: column; gap: 8px; }
        .note-item {
            background: color-mix(in srgb, var(--panel, var(--bg)) 92%, transparent);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .note-item a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
        .note-item a:hover { text-decoration: underline; }
        .note-item .date { font-size: 12px; color: var(--gray); }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--text);
        }
        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .share-header span {
                padding: 8px 6px !important;
                min-width: auto !important;
            }
            .share-item > * {
                padding: 8px 6px !important;
                min-width: auto !important;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body data-ui-surface="app" data-theme="default">
    <div class="header">
        <h1 id="page-title">分享中心</h1>
        <div class="header-actions">
            <div data-theme-slot data-theme-mode="compact" data-theme-button-class="tool-btn"></div>
            <a href="/app">← 返回应用</a>
        </div>
    </div>

    <div class="container" id="main-container">
        <!-- 动态内容区域 -->
    </div>

    <script src="/js/shares-page.js"></script>
</body>
</html>
