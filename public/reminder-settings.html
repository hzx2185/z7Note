<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提醒设置 - z7Note</title>
  <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
  <link rel="stylesheet" href="/css/app.css?v=20250312-FINAL-FIX">
</head>
<body class="reminder-settings-page" data-ui-surface="app" data-theme="default">
  <div id="loading" class="reminder-loading">⌛ 同步中...</div>

  <div class="reminder-nav-header workspace-brand-panel">
    <h1>提醒配置</h1>
    <div class="reminder-nav-actions">
      <div data-theme-slot data-theme-mode="compact" data-theme-button-class="tool-btn"></div>
      <a href="/calendar.html" class="btn btn-secondary">返回日历</a>
    </div>
  </div>

  <div class="reminder-main-wrapper">
    <!-- 左侧：设置表单 -->
    <div class="reminder-settings-col">
      <form id="reminder-settings-form">
        <div class="reminder-section workspace-brand-panel">
          <span class="reminder-section-title">⏰ 核心开关</span>
          <div class="reminder-grid-row">
            <label class="reminder-check-row"><input type="checkbox" name="event_reminder_enabled"><span class="reminder-check-label">日历事件</span></label>
            <label class="reminder-check-row"><input type="checkbox" name="todo_reminder_enabled"><span class="reminder-check-label">待办事项</span></label>
          </div>
          <div class="reminder-input-row">
            <div class="reminder-input-box"><input type="number" name="reminder_advance_days" min="0" placeholder="0"><span class="reminder-input-unit">天</span></div>
            <div class="reminder-input-box"><input type="number" name="reminder_advance_hours" min="0" max="23" placeholder="0"><span class="reminder-input-unit">时</span></div>
            <div class="reminder-input-box"><input type="number" name="reminder_advance_minutes" min="0" max="59" placeholder="0"><span class="reminder-input-unit">分</span></div>
          </div>
        </div>

        <div class="reminder-section workspace-brand-panel">
          <span class="reminder-section-title">📡 通知通道</span>
          <div class="reminder-grid-row">
            <label class="reminder-check-row"><input type="checkbox" name="email_reminder_enabled"><span class="reminder-check-label">邮件</span></label>
            <label class="reminder-check-row"><input type="checkbox" name="browser_reminder_enabled"><span class="reminder-check-label">浏览器</span></label>
            <label class="reminder-check-row"><input type="checkbox" name="caldav_reminder_enabled"><span class="reminder-check-label">CalDAV</span></label>
          </div>
        </div>

        <div class="reminder-section workspace-brand-panel">
          <span class="reminder-section-title">🌙 勿扰时段</span>
          <div class="reminder-time-flex">
            <div><label>静默开始</label><input type="time" name="quiet_start_time"></div>
            <div><label>恢复时间</label><input type="time" name="quiet_end_time"></div>
          </div>
        </div>

        <div class="reminder-section workspace-brand-panel">
          <span class="reminder-section-title">✅ 归档自动化</span>
          <label class="reminder-check-row reminder-check-row-spaced"><input type="checkbox" name="todo_complete_to_event"><span class="reminder-check-label">待办完成转事件</span></label>
          <div id="delete-after-convert-group" class="reminder-convert-subgroup">
            <label class="reminder-check-row"><input type="checkbox" name="delete_todo_after_convert"><span class="reminder-check-label">转换后删除原待办</span></label>
          </div>
        </div>

        <button type="submit" class="reminder-save-btn">💾 保存并生效</button>
      </form>
    </div>

    <!-- 右侧：提醒历史 -->
    <div class="reminder-history-col">
      <div class="reminder-history-card workspace-brand-panel">
        <div class="reminder-history-head">
          <span class="reminder-section-title reminder-section-title-reset">📋 历史记录</span>
          <button onclick="clearHistory()" class="tool-btn">清空</button>
        </div>
        <div id="history-list" class="reminder-history-list">加载中...</div>
      </div>
    </div>
  </div>

  <div id="notification" class="reminder-notification"></div>
  <script src="/js/reminder-settings.js?v=20250312-FINAL-FIX"></script>
</body>
</html>
