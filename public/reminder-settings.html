<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提醒设置 - z7Note</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

    /* 顶部导航 */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: var(--side); border-bottom: 1px solid var(--border);
      z-index: 100; backdrop-filter: blur(8px);
    }

    .nav-title { font-size: 14px; font-weight: 600; }

    .container { max-width: 800px; margin: 40px auto 0; padding: 24px 16px; }

    .header { margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .header p { color: var(--gray); font-size: 13px; }

    .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-icon { font-size: 18px; }
    .card-description { color: var(--gray); font-size: 12px; margin-top: 4px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px; color: var(--gray); }

    .form-input, .form-select {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 14px; transition: all 0.2s; outline: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.1); }

    .checkbox-group {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px;
      background: var(--side); border-radius: 8px; border: 1px solid var(--border); transition: all 0.2s; cursor: pointer;
    }
    .checkbox-group:hover { border-color: var(--accent); }
    .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin-top: 2px; accent-color: var(--accent); }

    .checkbox-label { cursor: pointer; font-size: 13px; flex: 1; }
    .checkbox-label-title { font-weight: 600; display: block; margin-bottom: 2px; }
    .checkbox-label-desc { color: var(--gray); font-size: 12px; line-height: 1.4; }

    .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .form-row-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    @media (max-width: 600px) { .form-row, .form-row-2 { grid-template-columns: 1fr; } }

    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn { height: 36px; padding: 0 20px; border-radius: 8px; font-size: 14px; font-weight: 500; }

    .notification {
      position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 12px;
      color: white; font-weight: 500; z-index: 10000; transform: translateX(420px);
      transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); display: flex; align-items: center; gap: 8px;
    }
    .notification.show { transform: translateX(0); }
    .notification.success { background: var(--green); }
    .notification.error { background: var(--red); }
    .notification.warning { background: #f59e0b; }

    .history-list { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    .history-item { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .history-item:hover { background: var(--side); }
    .history-item-status { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .history-item-status.success { background: rgba(45, 164, 78, 0.1); color: var(--green); }
    .history-item-status.failed { background: rgba(207, 34, 46, 0.1); color: var(--red); }

    .time-preset { padding: 4px 10px; background: var(--side); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.2s; color: var(--gray); }
    .time-preset:hover { border-color: var(--accent); color: var(--accent); }
    .time-preset.active { background: var(--accent); color: white; border-color: var(--accent); }

    .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <span class="nav-title">提醒设置</span>
    </div>
    <button class="nav-btn" onclick="window.location.href='/calendar.html'">返回日历</button>
  </nav>

  <div class="container">
    <div class="header">
      <h1>🔔 提醒设置</h1>
      <p>配置您的事件和待办事项提醒方式</p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <form id="reminder-settings-form">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-icon">⚙️</span>提醒开关</h2>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="event-reminder-enabled" name="event_reminder_enabled">
            <label for="event-reminder-enabled" class="checkbox-label">
              <span class="checkbox-label-title">启用事件提醒</span>
              <span class="checkbox-label-desc">在事件开始前收到提醒通知</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="todo-reminder-enabled" name="todo_reminder_enabled">
            <label for="todo-reminder-enabled" class="checkbox-label">
              <span class="checkbox-label-title">启用待办事项提醒</span>
              <span class="checkbox-label-desc">在待办事项截止前收到提醒通知</span>
            </label>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-icon">⏰</span>提醒时间</h2>
        </div>
        <p class="card-description" style="margin-bottom: 16px;">
          设置在事件/待办开始前多久收到提醒
        </p>
        <div class="form-group">
          <label class="form-label">提前时间</label>
          <div class="form-row">
            <div>
              <input type="number" class="form-input" name="reminder_advance_days" min="0" max="30" value="0" placeholder="0">
              <small style="color: var(--text-secondary); font-size: 12px;">天</small>
            </div>
            <div>
              <input type="number" class="form-input" name="reminder_advance_hours" min="0" max="23" value="1" placeholder="1">
              <small style="color: var(--text-secondary); font-size: 12px;">小时</small>
            </div>
            <div>
              <input type="number" class="form-input" name="reminder_advance_minutes" min="0" max="59" value="0" placeholder="0">
              <small style="color: var(--text-secondary); font-size: 12px;">分钟</small>
            </div>
          </div>
          <div class="time-presets">
            <span class="time-preset" data-days="0" data-hours="0" data-minutes="5">5分钟</span>
            <span class="time-preset" data-days="0" data-hours="0" data-minutes="15">15分钟</span>
            <span class="time-preset" data-days="0" data-hours="1" data-minutes="0">1小时</span>
            <span class="time-preset" data-days="0" data-hours="2" data-minutes="0">2小时</span>
            <span class="time-preset" data-days="1" data-hours="0" data-minutes="0">1天</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-icon">📧</span>提醒方式</h2>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="email-reminder-enabled" name="email_reminder_enabled">
            <label for="email-reminder-enabled" class="checkbox-label">
              <span class="checkbox-label-title">📧 邮件提醒</span>
              <span class="checkbox-label-desc">发送到您注册时使用的邮箱地址</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="browser-reminder-enabled" name="browser_reminder_enabled">
            <label for="browser-reminder-enabled" class="checkbox-label">
              <span class="checkbox-label-title">🔔 浏览器通知</span>
              <span class="checkbox-label-desc">在浏览器中显示推送通知（需要授权）</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="caldav-reminder-enabled" name="caldav_reminder_enabled">
            <label for="caldav-reminder-enabled" class="checkbox-label">
              <span class="checkbox-label-title">📅 日历应用提醒</span>
              <span class="checkbox-label-desc">通过CalDAV同步到其他日历应用（需要配置CalDAV）</span>
            </label>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-icon">🌙</span>免打扰时间</h2>
        </div>
        <p class="card-description" style="margin-bottom: 16px;">
          在此时间段内不会发送提醒通知
        </p>
        <div class="form-group">
          <div class="form-row-2">
            <div>
              <label class="form-label">开始时间</label>
              <input type="time" class="form-input" name="quiet_start_time" value="22:00">
            </div>
            <div>
              <label class="form-label">结束时间</label>
              <input type="time" class="form-input" name="quiet_end_time" value="08:00">
            </div>
          </div>
          <div class="time-presets">
            <span class="time-preset" data-start="22:00" data-end="08:00" data-is-quiet="true">22:00 - 08:00</span>
            <span class="time-preset" data-start="23:00" data-end="07:00" data-is-quiet="true">23:00 - 07:00</span>
            <span class="time-preset" data-start="00:00" data-end="06:00" data-is-quiet="true">00:00 - 06:00</span>
            <span class="time-preset" data-start="" data-end="" data-is-quiet="false">关闭免打扰</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">💾 保存设置</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/calendar.html'">返回日历</button>
      </div>
    </form>

    <div class="history-section">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><span class="card-icon">📋</span>提醒历史</h2>
          <div>
            <button type="button" class="btn btn-secondary" onclick="loadHistory()">刷新</button>
            <button type="button" class="btn btn-danger" onclick="clearHistory()">清除历史</button>
          </div>
        </div>
        <div class="history-list" id="history-list">
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-text">暂无提醒历史</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script src="/js/reminder-settings.js?v=2"></script>
</body>
</html>
