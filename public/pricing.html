<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="z7Note 会员套餐 - Free、Pro、Team 版本功能对比与价格">
  <title>会员套餐 - z7Note</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20250312-FINAL-FIX">
  <script src="/js/theme-runtime.js?v=20260419-theme-runtime"></script>
  <link rel="stylesheet" href="/css/site.css?v=20260612-release-109">
</head>
<body data-ui-surface="site" data-theme="default">
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="topbar-left">
        <a class="brand" href="/">
          <div class="brand-mark">Z</div>
          <div>
            <div>z7Note</div>
            <div class="brand-meta">全栈自托管 · 开源免费</div>
          </div>
        </a>
        <nav class="topnav">
          <a class="btn btn-secondary" href="/" title="首页">首页</a>
          <a class="btn btn-secondary" href="/#features" title="功能介绍">功能</a>
          <a class="btn btn-secondary" href="/pricing" title="会员套餐">套餐</a>
          <a class="btn btn-secondary" href="/member" title="会员中心">会员</a>
          <a class="btn btn-secondary" href="/help" title="帮助中心">帮助</a>
          <a class="btn btn-secondary" href="/changelog" title="更新日志">日志</a>
        </nav>
      </div>
      <div class="topbar-right">
        <div class="topnav-actions">
          <a class="btn btn-secondary" href="/login.html" data-site-auth-link>登录</a>
          <a class="btn btn-secondary site-hidden" href="/login.html?tab=register" data-site-register-link>注册</a>
          <a class="btn btn-secondary site-hidden" href="#" data-site-logout-link>退出</a>
          <div class="app-dropdown">
            <a class="btn btn-primary" href="/app" title="打开应用">应用⌄</a>
            <div class="app-dropdown-menu">
              <a class="app-dropdown-item" href="/app" data-site-module="notes">
                <span class="app-dropdown-item-icon">📝</span>
                笔记
              </a>
              <a class="app-dropdown-item" href="/calendar.html" data-site-module="calendar">
                <span class="app-dropdown-item-icon">📅</span>
                日历
              </a>
              <a class="app-dropdown-item" href="/contacts.html" data-site-module="contacts">
                <span class="app-dropdown-item-icon">👥</span>
                通讯录
              </a>
            </div>
          </div>
        </div>
        <div data-theme-slot data-theme-mode="compact" data-theme-button-class="btn btn-secondary theme-toggle-compact"></div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="shell">
        <h1>选择适合你的套餐</h1>
        <p id="pricing-hero-copy">从个人免费版到团队专业版，满足不同规模的使用需求。套餐能力与后台配置实时同步。</p>
        <div class="pricing-grid" id="pricing-grid"></div>
      </div>
    </section>

    <section class="section">
      <div class="shell">
        <div class="section-header">
          <h2>功能对比</h2>
          <p id="pricing-compare-copy">按分类切换查看，减少纵向滚动</p>
        </div>
        <div class="pricing-category-tabs" id="pricing-category-tabs"></div>
        <table class="compare-table" id="pricing-compare-table">
          <thead>
            <tr id="pricing-compare-head">
              <th>功能</th>
            </tr>
          </thead>
          <tbody id="pricing-compare-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="shell">
      <div class="footer-inner">
        <div class="footer-brand">
          <strong>z7Note</strong>
          <span>全栈自托管 · 开源免费</span>
        </div>
      </div>
    </div>
  </footer>

  <div class="modal-shell site-hidden" id="pricing-redeem-modal">
    <div class="modal-card">
      <div class="modal-card-head">
        <h3>立即兑换或升级</h3>
        <button class="close-btn" type="button" id="pricing-redeem-close-btn">×</button>
      </div>
      <div class="modal-card-body">
        <p class="member-section-copy">登录后输入兑换码即可即时升级套餐。未登录时会先跳转登录。</p>
        <div class="public-actions member-redeem-actions">
          <input id="pricing-redeem-input" class="member-redeem-input" type="text" placeholder="输入兑换码" autocomplete="off">
          <button class="btn btn-primary" id="pricing-redeem-btn" type="button">立即兑换</button>
        </div>
        <p id="pricing-redeem-message" class="brand-meta member-redeem-hint">支持 Pro / Team 套餐与统一配额兑换。</p>
      </div>
    </div>
  </div>

  <script type="module" src="/js/site-nav.js"></script>
  <script type="module" src="/js/pricing-page.js"></script>
</body>
</html>
