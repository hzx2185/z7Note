services:
  # 权限初始化容器：自动修复挂载目录权限，解决新安装报错问题
  init-chown:
    image: alpine:latest
    container_name: z7note-init
    user: "root"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: chown -R 1001:1001 /app/data /app/logs

  z7note-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: z7note:latest
    container_name: z7note
    depends_on:
      init-chown:
        condition: service_completed_successfully
    env_file: .env
    user: "1001:1001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: z7note-network